<style>
:root {
  --gold:#C9A84C; --gold-light:#E8C97A; --gold-pale:#F2DFA0; --gold-dim:#7A6230;
  --gold-glow:rgba(201,168,76,0.08); --gold-line:rgba(201,168,76,0.18);
  --bg:#07070A; --bg2:#0D0D10; --bg3:#111115; --bg4:#161619;
  --text:#EDE8DF; --text-muted:#9A9589; --text-dim:#4A4742; --white:#ffffff;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;font-size:16px;}
body{background:var(--bg);color:var(--text);font-family:'Jost',sans-serif;font-weight:300;overflow-x:hidden;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px;}

body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:0.35;}

nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:18px 44px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to bottom,rgba(7,7,10,0.96) 0%,transparent 100%);
  backdrop-filter:blur(0px);transition:backdrop-filter 0.4s,background 0.4s;}
nav.scrolled{backdrop-filter:blur(20px);background:rgba(7,7,10,0.92);border-bottom:0.5px solid var(--gold-line);}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.nav-logo img{width:36px;height:36px;object-fit:contain;opacity:0.92;}
.nav-logo span{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold-dim);}
.nav-cta{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--gold);text-decoration:none;border:0.5px solid var(--gold-dim);padding:9px 22px;border-radius:2px;transition:all 0.3s;}
.nav-cta:hover{background:var(--gold-glow);border-color:var(--gold);}

#hero{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:120px 40px 80px;overflow:hidden;}
.hero-bg{position:absolute;inset:0;z-index:0;
  background:radial-gradient(ellipse 70% 55% at 50% 45%,rgba(120,80,180,0.09) 0%,transparent 70%),
             radial-gradient(ellipse 45% 65% at 25% 85%,rgba(201,168,76,0.05) 0%,transparent 65%),
             radial-gradient(ellipse 55% 45% at 75% 15%,rgba(201,168,76,0.04) 0%,transparent 60%);}
.hero-mandala{position:absolute;z-index:1;width:min(560px,95vw);height:min(560px,95vw);
  top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.065;
  animation:slowSpin 90s linear infinite;pointer-events:none;}
.hero-mandala img{width:100%;height:100%;object-fit:contain;}
@keyframes slowSpin{to{transform:translate(-50%,-50%) rotate(360deg);}}
.hero-ring{position:absolute;z-index:1;border-radius:50%;
  border:0.5px solid rgba(201,168,76,0.07);pointer-events:none;
  width:min(720px,115vw);height:min(720px,115vw);
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation:pulse-ring 7s ease-in-out infinite;}
.hero-ring:nth-child(3){width:min(880px,140vw);height:min(880px,140vw);
  border-color:rgba(201,168,76,0.04);animation-delay:3s;}
@keyframes pulse-ring{0%,100%{opacity:0.5;transform:translate(-50%,-50%) scale(1);}50%{opacity:1;transform:translate(-50%,-50%) scale(1.012);}}
.hero-content{position:relative;z-index:2;text-align:center;max-width:840px;
  animation:fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(32px);}to{opacity:1;transform:translateY(0);}}
.hero-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.32em;text-transform:uppercase;
  color:var(--gold-dim);margin-bottom:36px;animation:fadeUp 1.2s 0.15s cubic-bezier(0.16,1,0.3,1) both;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(38px,6.5vw,76px);
  font-weight:300;line-height:1.07;color:var(--text);letter-spacing:0.01em;margin-bottom:28px;
  animation:fadeUp 1.2s 0.3s cubic-bezier(0.16,1,0.3,1) both;}
.hero-title em{color:var(--gold);font-style:italic;}
.hero-sub{font-size:clamp(14px,1.8vw,17px);color:var(--text-muted);line-height:1.85;
  max-width:580px;margin:0 auto 52px;font-weight:300;
  animation:fadeUp 1.2s 0.45s cubic-bezier(0.16,1,0.3,1) both;}
.hero-actions{display:flex;flex-direction:column;align-items:center;gap:18px;
  animation:fadeUp 1.2s 0.6s cubic-bezier(0.16,1,0.3,1) both;}
.btn-primary{display:inline-flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,#C9A84C 0%,#E8C97A 50%,#C9A84C 100%);
  color:var(--bg);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.22em;
  text-transform:uppercase;padding:17px 48px;border-radius:2px;text-decoration:none;
  font-weight:500;border:none;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden;}
.btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#E8C97A,#C9A84C);opacity:0;transition:opacity 0.3s;}
.btn-primary:hover::before{opacity:1;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 16px 48px rgba(201,168,76,0.28);}
.btn-primary span{position:relative;z-index:1;}
.btn-outline{display:inline-flex;align-items:center;gap:8px;background:transparent;
  color:var(--text-muted);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.18em;
  text-transform:uppercase;padding:14px 36px;border:0.5px solid rgba(201,168,76,0.25);
  border-radius:2px;text-decoration:none;cursor:pointer;transition:all 0.3s;}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.hero-price{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;color:var(--gold-dim);}
.hero-note{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-dim);}

.divider{width:100%;height:0.5px;background:linear-gradient(to right,transparent,var(--gold-line),transparent);}
section{position:relative;z-index:1;}
.section-inner{max-width:820px;margin:0 auto;padding:108px 40px;}
.section-inner.narrow{max-width:640px;}
.section-inner.wide{max-width:1120px;}
.section-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.28em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:24px;display:block;}
.section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,4vw,50px);font-weight:300;line-height:1.14;color:var(--gold);margin-bottom:36px;letter-spacing:0.02em;}
.section-title em{color:var(--text);font-style:italic;}
.section-body{font-size:15.5px;color:var(--text-muted);line-height:1.85;font-weight:300;}
.section-body p+p{margin-top:20px;}
.section-body strong{color:var(--text);font-weight:400;}

#sobre{background:var(--bg);}
.sobre-quote{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(20px,2.8vw,30px);color:var(--gold-light);line-height:1.45;margin:44px 0;padding:28px 0 28px 28px;border-left:1px solid var(--gold-line);}
.sobre-pillars{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--gold-line);margin-top:60px;border:0.5px solid var(--gold-line);}
.pillar{background:var(--bg2);padding:36px 28px;text-align:center;}
.pillar-word{font-family:'Cormorant Garamond',serif;font-size:24px;font-style:italic;color:var(--gold);display:block;margin-bottom:8px;}
.pillar-sub{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);}

#servicos{background:var(--bg2);}
.serv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:56px;background:var(--gold-line);border:0.5px solid var(--gold-line);}
.serv-card{background:var(--bg3);padding:44px 36px;position:relative;overflow:hidden;opacity:0;transform:translateY(16px);transition:opacity 0.5s,transform 0.5s;}
.serv-card.visible{opacity:1;transform:translateY(0);}
.serv-card:hover{background:var(--bg4);}
.serv-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(201,168,76,0.3),transparent);}
.serv-num{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:20px;display:block;}
.serv-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--gold);margin-bottom:16px;letter-spacing:0.02em;}
.serv-desc{font-size:14px;color:var(--text-muted);line-height:1.78;margin-bottom:24px;}
.serv-tags{display:flex;flex-wrap:wrap;gap:6px;}
.serv-tag{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dim);padding:4px 10px;border:0.5px solid rgba(201,168,76,0.12);}
.serv-intense-btn{margin-top:20px;display:inline-flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);background:none;border:0.5px solid var(--gold-dim);padding:10px 20px;cursor:pointer;transition:all 0.3s;text-decoration:none;}
.serv-intense-btn:hover{background:var(--gold-glow);border-color:var(--gold);}

#como{background:var(--bg);}
.steps{display:grid;gap:2px;margin-top:48px;}
.step{display:grid;grid-template-columns:52px 1fr;gap:24px;align-items:start;background:var(--bg2);padding:30px 34px;border:0.5px solid rgba(201,168,76,0.06);opacity:0;transform:translateX(-20px);transition:opacity 0.6s,transform 0.6s,border-color 0.3s;}
.step.visible{opacity:1;transform:translateX(0);}
.step:hover{border-color:var(--gold-line);}
.step-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--gold-dim);letter-spacing:0.1em;padding-top:3px;}
.step-content h3{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:400;color:var(--text);margin-bottom:10px;}
.step-content p{font-size:14px;color:var(--text-muted);line-height:1.72;}

#centros{background:var(--bg2);}
.centros-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:2px;margin-top:48px;background:var(--gold-line);border:0.5px solid var(--gold-line);}
.centro-item{background:var(--bg3);padding:26px 32px;display:flex;gap:18px;align-items:flex-start;opacity:0;transform:translateY(16px);transition:opacity 0.5s,transform 0.5s;}
.centro-item.visible{opacity:1;transform:translateY(0);}
.centro-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:7px;}
.centro-text{font-size:14.5px;color:var(--text-muted);line-height:1.6;}

#antena{background:var(--bg);overflow:hidden;position:relative;}
#antena::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(120,80,180,0.05) 0%,transparent 70%);pointer-events:none;}
.antena-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;padding:120px 40px;max-width:980px;margin:0 auto;}
.antena-signals{display:flex;flex-direction:column;gap:16px;}
.signal-item{display:flex;align-items:center;gap:14px;padding:16px 20px;background:var(--bg2);border:0.5px solid rgba(201,168,76,0.08);opacity:0;transform:translateX(-16px);transition:opacity 0.5s,transform 0.5s;}
.signal-item.visible{opacity:1;transform:translateX(0);}
.signal-icon{font-family:'DM Mono',monospace;font-size:10px;color:#4FC9C9;letter-spacing:0.1em;min-width:60px;}
.signal-label{font-size:13px;color:var(--text-muted);}
.antena-highlight{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(22px,2.8vw,36px);color:var(--gold);line-height:1.3;margin:32px 0;}

#experiencia{background:var(--bg2);}
.exp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:48px;background:var(--gold-line);border:0.5px solid var(--gold-line);}
.exp-item{background:var(--bg3);padding:28px 24px;text-align:center;opacity:0;transform:translateY(12px);transition:opacity 0.4s,transform 0.4s;}
.exp-item.visible{opacity:1;transform:translateY(0);}
.exp-item:hover{background:var(--bg4);}
.exp-icon{font-size:18px;margin-bottom:12px;}
.exp-label{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:var(--text-muted);}

#diferenciais{background:var(--bg);}
.diff-list{display:grid;grid-template-columns:repeat(2,1fr);gap:2px;margin-top:48px;background:var(--gold-line);border:0.5px solid var(--gold-line);}
.diff-item{background:var(--bg2);padding:22px 28px;display:flex;align-items:flex-start;gap:16px;opacity:0;transition:opacity 0.5s;}
.diff-item.visible{opacity:1;}
.diff-check{font-family:'DM Mono',monospace;font-size:11px;color:var(--gold);flex-shrink:0;margin-top:2px;}
.diff-text{font-size:14px;color:var(--text-muted);line-height:1.6;}

#galeria-fotos{background:var(--bg2);}
.foto-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;margin-top:48px;background:var(--gold-line);border:0.5px solid var(--gold-line);}
.foto-item{position:relative;overflow:hidden;cursor:pointer;}
.foto-item:nth-child(1),.foto-item:nth-child(6){grid-column:span 2;}
.foto-item img{width:100%;height:100%;min-height:200px;object-fit:cover;transition:transform 8s ease;filter:brightness(0.85) saturate(0.88);display:block;}
.foto-item:hover img{transform:scale(1.06);filter:brightness(0.95) saturate(1.1);}
.foto-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(7,7,10,0.6) 0%,transparent 50%);opacity:0;transition:opacity 0.4s;}
.foto-item:hover .foto-overlay{opacity:1;}

#galeria-videos{background:var(--bg);}
.video-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:48px;background:var(--gold-line);border:0.5px solid var(--gold-line);}
.video-thumb{position:relative;overflow:hidden;cursor:pointer;background:var(--bg2);aspect-ratio:9/16;}
.video-thumb video{width:100%;height:100%;object-fit:cover;display:block;transition:transform 8s ease;filter:brightness(0.72) saturate(0.82);}
.video-thumb:hover video{transform:scale(1.04);filter:brightness(0.88) saturate(1.05);}
.vthumb-cin{position:absolute;inset:0;pointer-events:none;background:linear-gradient(to bottom,rgba(7,7,10,0.35) 0%,transparent 30%,transparent 70%,rgba(7,7,10,0.55) 100%);}
.vthumb-overlay{position:absolute;inset:0;background:rgba(7,7,10,0.4);display:flex;align-items:center;justify-content:center;transition:background 0.3s;}
.video-thumb:hover .vthumb-overlay{background:rgba(7,7,10,0.2);}
.play-btn{width:56px;height:56px;border-radius:50%;border:1.5px solid rgba(201,168,76,0.7);display:flex;align-items:center;justify-content:center;transition:all 0.3s;backdrop-filter:blur(4px);}
.video-thumb:hover .play-btn{background:rgba(201,168,76,0.18);border-color:var(--gold);box-shadow:0 0 28px rgba(201,168,76,0.25);}
.play-btn svg{width:20px;height:20px;fill:var(--gold);margin-left:3px;}
.vthumb-label{position:absolute;bottom:14px;left:16px;right:16px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(237,232,223,0.55);}

.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.94);display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(10px);}
.modal-overlay.open{display:flex;}
.modal-box{position:relative;width:100%;max-width:480px;background:var(--bg2);border:0.5px solid var(--gold-line);}
.modal-close{position:absolute;top:-38px;right:0;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);cursor:pointer;background:none;border:none;transition:color 0.2s;}
.modal-close:hover{color:var(--gold);}
.modal-video{width:100%;background:#000;}
.modal-video video{width:100%;display:block;max-height:85vh;object-fit:contain;}

#depoimentos{background:var(--bg2);}
.dep-carousel{position:relative;overflow:hidden;margin-top:48px;}
.dep-track{display:flex;gap:2px;transition:transform 0.65s cubic-bezier(0.16,1,0.3,1);}
.dep-card{flex:0 0 calc(50% - 1px);background:var(--bg3);border:0.5px solid rgba(201,168,76,0.06);overflow:hidden;}
.dep-card-img{width:100%;aspect-ratio:4/3;object-fit:cover;filter:brightness(0.8) saturate(0.75);display:block;}
.dep-card-text{padding:28px 32px;}
.dep-quote-mark{font-family:'Cormorant Garamond',serif;font-size:52px;color:rgba(201,168,76,0.15);line-height:0.8;margin-bottom:16px;display:block;}
.dep-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;color:var(--text-muted);line-height:1.7;margin-bottom:16px;}
.dep-author{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold-dim);}
.dep-nav{display:flex;gap:8px;justify-content:center;margin-top:20px;}
.dep-dot{width:6px;height:6px;border-radius:50%;background:var(--gold-dim);cursor:pointer;transition:all 0.3s;border:none;padding:0;}
.dep-dot.active{background:var(--gold);transform:scale(1.3);}

#investimento{background:var(--bg);}
.inv-card{border:0.5px solid var(--gold-line);padding:60px;text-align:center;max-width:560px;margin:48px auto 0;background:var(--bg2);position:relative;overflow:hidden;}
.inv-card::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:60%;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);}
.inv-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:20px;}
.inv-price{font-family:'Cormorant Garamond',serif;font-size:clamp(56px,8vw,82px);font-weight:300;color:var(--gold);line-height:1;margin-bottom:8px;letter-spacing:-0.02em;}
.inv-price-label{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:var(--text-dim);margin-bottom:40px;}
.inv-details{font-size:13.5px;color:var(--text-muted);line-height:1.8;margin-bottom:36px;}
.inv-details strong{color:var(--text);font-weight:400;}
.pix-box{background:var(--bg3);padding:16px 20px;border:0.5px solid rgba(201,168,76,0.1);margin-bottom:32px;text-align:left;}
.pix-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:6px;display:block;}
.pix-key{font-family:'DM Mono',monospace;font-size:12px;color:var(--text-muted);word-break:break-all;}
.btn-whatsapp{display:inline-flex;align-items:center;gap:10px;background:transparent;color:var(--gold);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;padding:16px 44px;border-radius:2px;text-decoration:none;border:0.5px solid var(--gold);cursor:pointer;transition:all 0.3s;width:100%;justify-content:center;}
.btn-whatsapp:hover{background:var(--gold);color:var(--bg);}
.btn-whatsapp svg{width:18px;height:18px;}

#faq{background:var(--bg2);}
.faq-list{margin-top:48px;display:flex;flex-direction:column;gap:2px;}
.faq-item{border:0.5px solid rgba(201,168,76,0.06);background:var(--bg3);overflow:hidden;}
.faq-q{padding:22px 28px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--text);transition:color 0.2s;user-select:none;}
.faq-q:hover{color:var(--gold);}
.faq-icon{font-family:'DM Mono',monospace;font-size:16px;color:var(--gold-dim);flex-shrink:0;margin-left:20px;transition:transform 0.3s;}
.faq-item.open .faq-icon{transform:rotate(45deg);}
.faq-a{max-height:0;overflow:hidden;transition:max-height 0.4s cubic-bezier(0.16,1,0.3,1),padding 0.3s;font-size:14.5px;color:var(--text-muted);line-height:1.75;padding:0 28px;}
.faq-item.open .faq-a{max-height:220px;padding:0 28px 24px;}

footer{background:var(--bg);padding:64px 40px;text-align:center;border-top:0.5px solid var(--gold-line);}
.footer-logo{margin-bottom:24px;}
.footer-logo img{width:48px;height:48px;object-fit:contain;opacity:0.6;}
.footer-text{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-dim);line-height:2.2;}

.wa-float{position:fixed;bottom:32px;right:32px;z-index:200;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#C9A84C,#E8C97A);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(201,168,76,0.3);text-decoration:none;transition:all 0.3s;animation:float-pulse 3s ease-in-out infinite;}
.wa-float:hover{transform:scale(1.1);box-shadow:0 12px 44px rgba(201,168,76,0.45);}
.wa-float svg{width:24px;height:24px;fill:var(--bg);}
@keyframes float-pulse{0%,100%{box-shadow:0 8px 32px rgba(201,168,76,0.3);}50%{box-shadow:0 8px 52px rgba(201,168,76,0.52);}}

.intense-overlay{position:fixed;inset:0;z-index:1100;background:rgba(0,0,0,0.96);display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(16px);overflow-y:auto;}
.intense-overlay.open{display:flex;animation:fadeM 0.45s ease both;}
@keyframes fadeM{from{opacity:0;}to{opacity:1;}}
.intense-box{position:relative;width:100%;max-width:600px;background:var(--bg2);border:0.5px solid var(--gold-line);overflow:hidden;margin:auto;}
.intense-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);}
.intense-close{position:absolute;top:16px;right:20px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);cursor:pointer;background:none;border:none;transition:color 0.2s;z-index:2;}
.intense-close:hover{color:var(--gold);}
.intense-content{padding:52px;}
.intense-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:20px;display:block;}
.intense-title{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,4vw,44px);font-weight:300;color:var(--gold);line-height:1.15;margin-bottom:24px;}
.intense-body{font-size:14.5px;color:var(--text-muted);line-height:1.82;margin-bottom:28px;}
.intense-list{list-style:none;margin-bottom:32px;display:grid;gap:10px;}
.intense-list li{display:flex;gap:12px;font-size:13.5px;color:var(--text-muted);}
.intense-list li::before{content:'—';color:var(--gold-dim);flex-shrink:0;}
.intense-price{font-family:'Cormorant Garamond',serif;font-size:clamp(44px,6vw,64px);font-weight:300;color:var(--gold);line-height:1;margin-bottom:8px;}
.intense-price-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);margin-bottom:32px;display:block;}
.intense-divider{height:0.5px;background:var(--gold-line);margin:28px 0;}

.reveal{opacity:0;transform:translateY(24px);transition:opacity 0.7s,transform 0.7s;}
.reveal.visible{opacity:1;transform:translateY(0);}

@media(max-width:768px){
  nav{padding:16px 20px;}
  .section-inner{padding:80px 20px;}
  .antena-grid{grid-template-columns:1fr;gap:48px;padding:80px 20px;}
  .sobre-pillars,.centros-grid,.diff-list,.serv-grid{grid-template-columns:1fr;}
  .exp-grid{grid-template-columns:repeat(2,1fr);}
  .foto-grid{grid-template-columns:repeat(2,1fr);}
  .foto-item:nth-child(1),.foto-item:nth-child(6){grid-column:span 1;}
  .video-grid{grid-template-columns:1fr;}
  .dep-card{flex:0 0 88%;}
  .inv-card{padding:40px 24px;}
  .intense-content{padding:36px 24px;}
  .wa-float{bottom:20px;right:20px;}
}
@media(max-width:480px){
  .exp-grid{grid-template-columns:1fr;}
  .hero-title{font-size:clamp(32px,8vw,48px);}
}
</style>
