<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akasha Hub | Área de Membros</title>
  <link rel="icon" type="image/webp" href="https://res.cloudinary.com/dcbarseus/image/upload/v1773707211/IMG_20260104_135834_828_nsimow.webp">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Cinzel:wght@400;500&family=Raleway:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
  :root{
    --bg:#06050a;--bg2:#09071a;
    --gold:#c8a04e;--gold-lt:#e8cb80;
    --gold-border:rgba(200,160,78,.28);--gold-dim:rgba(200,160,78,.12);
    --white:#f4ede0;--muted:rgba(244,237,224,.38);
    --purple:#7c4dbd;--purple-lt:#a67fdc;
    --teal:#2a9aad;--teal-lt:#56cfe1;
    --surface:rgba(255,255,255,.022);
    --r:3px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--white);font-family:'Raleway',sans-serif;font-weight:300;font-size:15px;line-height:1.75;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
  .amb{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .orb{position:absolute;border-radius:50%;filter:blur(110px);animation:orbF 22s ease-in-out infinite;}
  .o1{width:600px;height:600px;top:-10%;left:-15%;background:rgba(80,40,160,.07);}
  .o2{width:400px;height:400px;top:40%;right:-10%;background:rgba(200,160,78,.05);animation-delay:-9s;}
  .o3{width:500px;height:500px;bottom:-15%;left:25%;background:rgba(30,90,130,.06);animation-delay:-16s;}
  @keyframes orbF{0%,100%{transform:translate(0,0);}40%{transform:translate(25px,-18px);}70%{transform:translate(-18px,22px);}}
  .grid-veil{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(200,160,78,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(200,160,78,.018) 1px,transparent 1px);background-size:50px 50px;animation:gDrift 35s linear infinite;}
  @keyframes gDrift{0%{background-position:0 0;}100%{background-position:50px 50px;}}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:rgba(6,5,10,.88);backdrop-filter:blur(14px);border-bottom:1px solid rgba(200,160,78,.07);}
  .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
  .nav-logo img{width:34px;height:34px;border-radius:50%;filter:drop-shadow(0 0 6px rgba(200,160,78,.35));}
  .nav-logo span{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:4px;color:var(--white);}
  .nav-logo span b{color:var(--gold-lt);font-weight:400;}
  .back{font-size:.6rem;letter-spacing:4px;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .3s;padding:8px 14px;border:1px solid rgba(255,255,255,.05);border-radius:2px;}
  .back:hover{color:var(--gold);border-color:var(--gold-border);}
  #ls{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .6s;}
  #ls.hide{opacity:0;pointer-events:none;}
  .ls-sym{font-size:2rem;color:var(--gold);opacity:.4;animation:spin 6s linear infinite;display:inline-block;margin-bottom:16px;}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  .ls-txt{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:5px;text-transform:uppercase;color:var(--gold);opacity:.4;animation:pulse 1.8s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.25;}50%{opacity:.7;}}
  main{position:relative;z-index:3;max-width:600px;margin:0 auto;padding:100px 22px 80px;}
  .page-header{margin-bottom:38px;animation:riseIn .9s cubic-bezier(.16,1,.3,1) both;}
  .page-eyebrow{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:5px;text-transform:uppercase;color:var(--gold);opacity:.6;display:block;margin-bottom:10px;}
  .page-title{font-family:'Playfair Display',serif;font-weight:400;font-size:2.2rem;letter-spacing:3px;line-height:1.1;color:var(--white);}
  .page-title em{font-style:italic;color:var(--gold-lt);}
  .page-sub{font-size:13px;letter-spacing:.4px;color:var(--muted);margin-top:10px;line-height:1.8;}
  .user-strip{display:flex;align-items:center;gap:14px;padding:14px 18px;border:1px solid var(--gold-border);border-radius:var(--r);background:rgba(200,160,78,.04);margin-bottom:32px;animation:riseIn .7s .15s cubic-bezier(.16,1,.3,1) both;}
  .user-avatar{width:38px;height:38px;border-radius:50%;border:1px solid var(--gold-border);background:linear-gradient(135deg,rgba(200,160,78,.2),rgba(124,77,189,.15));display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1rem;color:var(--gold-lt);flex-shrink:0;}
  .user-info{flex:1;}
  .user-name{font-family:'Playfair Display',serif;font-size:1rem;letter-spacing:.8px;color:var(--white);display:block;}
  .user-nivel{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--gold);opacity:.7;display:block;margin-top:2px;}
  .user-logout{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);background:none;border:1px solid rgba(255,255,255,.06);border-radius:2px;padding:6px 12px;cursor:pointer;transition:all .3s;}
  .user-logout:hover{color:var(--gold);border-color:var(--gold-border);}
  .divider{display:flex;align-items:center;gap:12px;margin:28px 0 20px;}
  .div-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold-border),transparent);}
  .div-gem{width:4px;height:4px;background:var(--gold);transform:rotate(45deg);opacity:.5;}
  .sec-lbl{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .sec-lbl span{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:5px;text-transform:uppercase;color:var(--gold);opacity:.55;white-space:nowrap;}
  .sec-lbl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold-border),transparent);}
  .levels{display:flex;flex-direction:column;gap:10px;}
  .lv{width:100%;position:relative;overflow:hidden;border-radius:var(--r);border:1px solid rgba(255,255,255,.06);background:var(--surface);cursor:pointer;transition:all .4s cubic-bezier(.25,1,.5,1);animation:riseIn .7s cubic-bezier(.16,1,.3,1) both;text-align:left;}
  .lv::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);transform:scaleY(0);transition:transform .4s;transform-origin:bottom;}
  .lv::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:linear-gradient(90deg,var(--gold),transparent);transition:width .5s;}
  .lv:hover{border-color:var(--gold-border);transform:translateX(4px);}
  .lv:hover::before{transform:scaleY(1);}
  .lv:hover::after{width:100%;}
  .lv.nivel-1{border-color:rgba(200,160,78,.14);}
  .lv.nivel-1::before{background:var(--gold);}
  .lv.nivel-2{border-color:rgba(86,207,225,.12);}
  .lv.nivel-2::before{background:var(--teal-lt);}
  .lv.nivel-2::after{background:linear-gradient(90deg,var(--teal-lt),transparent);}
  .lv.nivel-3{border-color:rgba(166,127,220,.14);}
  .lv.nivel-3::before{background:var(--purple-lt);}
  .lv.nivel-3::after{background:linear-gradient(90deg,var(--purple-lt),transparent);}
  .lv.nivel-4{border-color:rgba(200,160,78,.28);background:linear-gradient(135deg,rgba(200,160,78,.06),rgba(124,77,189,.04));}
  .lv.nivel-4::before{background:linear-gradient(var(--gold-lt),var(--purple-lt));}
  .lv.locked{opacity:.3;cursor:default;pointer-events:none;}
  .lv.locked::before,.lv.locked::after{display:none;}
  .lv-inner{padding:22px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
  .lv-left{display:flex;align-items:center;gap:16px;}
  .lv-orb{width:46px;height:46px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.15rem;border:1px solid;position:relative;overflow:hidden;}
  .lv.nivel-1 .lv-orb{border-color:var(--gold-border);color:var(--gold-lt);background:rgba(200,160,78,.08);}
  .lv.nivel-2 .lv-orb{border-color:rgba(86,207,225,.3);color:var(--teal-lt);background:rgba(86,207,225,.07);}
  .lv.nivel-3 .lv-orb{border-color:rgba(166,127,220,.3);color:var(--purple-lt);background:rgba(124,77,189,.08);}
  .lv.nivel-4 .lv-orb{border-color:var(--gold-border);color:var(--gold-lt);background:linear-gradient(135deg,rgba(200,160,78,.12),rgba(124,77,189,.08));}
  .lv-tag{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:4px;}
  .lv.nivel-1 .lv-tag{color:rgba(200,160,78,.5);}
  .lv.nivel-2 .lv-tag{color:rgba(86,207,225,.5);}
  .lv.nivel-3 .lv-tag{color:rgba(166,127,220,.5);}
  .lv.nivel-4 .lv-tag{color:rgba(200,160,78,.6);}
  .lv-name{font-family:'Playfair Display',serif;font-weight:400;font-size:1.12rem;letter-spacing:1.5px;color:var(--white);}
  .lv-desc{font-size:12px;letter-spacing:.4px;color:var(--muted);margin-top:3px;}
  .lv-count{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:5px;}
  .lv-right{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;}
  .badge-cur{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold-border);padding:4px 10px;border-radius:20px;background:rgba(200,160,78,.06);}
  .badge-open{font-size:.9rem;color:var(--gold);opacity:.6;}
  .lv.nivel-2 .badge-open{color:var(--teal-lt);}
  .lv.nivel-3 .badge-open{color:var(--purple-lt);}
  .badge-lock{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.06);padding:4px 10px;border-radius:20px;}
  .content-overlay{position:fixed;inset:0;z-index:300;background:rgba(5,4,8,.94);backdrop-filter:blur(16px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s ease;}
  .content-overlay.open{opacity:1;pointer-events:all;}
  .content-sheet{width:100%;max-width:620px;max-height:94vh;background:linear-gradient(175deg,#0c0920 0%,#08071a 100%);border:1px solid rgba(200,160,78,.15);border-bottom:none;border-radius:18px 18px 0 0;position:relative;transform:translateY(100%);transition:transform .5s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;overflow:hidden;}
  .content-overlay.open .content-sheet{transform:translateY(0);}
  .cs-bg{position:absolute;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 10% 0%,rgba(200,160,78,.1) 0%,transparent 50%),radial-gradient(ellipse at 90% 100%,rgba(124,77,189,.08) 0%,transparent 50%);}
  .cs-grid{position:absolute;inset:0;pointer-events:none;z-index:0;opacity:.03;background-image:linear-gradient(rgba(200,160,78,1) 1px,transparent 1px),linear-gradient(90deg,rgba(200,160,78,1) 1px,transparent 1px);background-size:28px 28px;}
  .cs-handle{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;padding:14px 22px 0;flex-shrink:0;}
  .cs-pill{width:40px;height:4px;border-radius:2px;background:rgba(200,160,78,.22);margin-bottom:14px;}
  .cs-toprow{width:100%;display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;border-bottom:1px solid rgba(200,160,78,.08);}
  .cs-badge{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:4px;text-transform:uppercase;color:rgba(200,160,78,.5);}
  .cs-close{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:.85rem;transition:all .25s;}
  .cs-close:hover{background:rgba(200,160,78,.1);border-color:var(--gold-border);color:var(--gold);}
  .cs-body{position:relative;z-index:2;overflow-y:auto;flex:1;padding:22px 22px 40px;scrollbar-width:thin;scrollbar-color:rgba(200,160,78,.15) transparent;}
  .cs-body::-webkit-scrollbar{width:3px;}
  .cs-body::-webkit-scrollbar-thumb{background:rgba(200,160,78,.15);border-radius:2px;}
  .cs-header{margin-bottom:24px;}
  .cs-nivel-tag{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:4px;text-transform:uppercase;display:block;margin-bottom:8px;opacity:.65;}
  .cs-title{font-family:'Playfair Display',serif;font-weight:400;font-size:1.7rem;letter-spacing:2px;line-height:1.15;color:var(--white);}
  .cs-title em{font-style:italic;}
  .cs-desc{font-size:13.5px;letter-spacing:.35px;line-height:1.85;color:var(--muted);margin-top:10px;}
  .cs-progress{margin-bottom:22px;}
  .cs-progress-row{display:flex;justify-content:space-between;font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .cs-progress-bar{width:100%;height:2px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;}
  .cs-progress-fill{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.25,1,.5,1);}
  .modules{display:flex;flex-direction:column;gap:12px;}
  .module{border:1px solid rgba(255,255,255,.05);border-radius:var(--r);overflow:hidden;background:rgba(255,255,255,.014);transition:border-color .3s;}
  .module:hover{border-color:rgba(200,160,78,.18);}
  .module-head{padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:background .3s;position:relative;}
  .module-head:hover{background:rgba(200,160,78,.03);}
  .module-num{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:3px;color:var(--gold);opacity:.55;flex-shrink:0;min-width:28px;}
  .module-name{font-family:'Playfair Display',serif;font-size:1rem;letter-spacing:1px;color:var(--white);flex:1;}
  .module-count{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);flex-shrink:0;}
  .module-chevron{font-size:.75rem;color:var(--gold);opacity:.5;flex-shrink:0;transition:transform .35s;}
  .module.open .module-chevron{transform:rotate(90deg);}
  .module-line{position:absolute;bottom:0;left:18px;right:18px;height:1px;background:linear-gradient(90deg,rgba(200,160,78,.12),transparent);}
  .video-list{display:none;padding:4px 0 10px;}
  .module.open .video-list{display:block;animation:slideDown .3s ease;}
  @keyframes slideDown{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
  .vitem{display:flex;align-items:center;gap:14px;padding:12px 18px 12px 22px;cursor:pointer;transition:all .25s;position:relative;border-bottom:1px solid rgba(255,255,255,.03);}
  .vitem:last-child{border-bottom:none;}
  .vitem:hover{background:rgba(200,160,78,.04);}
  .vitem.watched .vitem-icon{opacity:1;}
  .vitem.playing{background:rgba(200,160,78,.07);}
  .vitem.playing::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--gold);}
  .vitem-icon{width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.7rem;color:var(--muted);background:rgba(255,255,255,.02);transition:all .3s;}
  .vitem:hover .vitem-icon{border-color:var(--gold-border);color:var(--gold);background:rgba(200,160,78,.06);}
  .vitem.watched .vitem-icon{border-color:rgba(200,160,78,.3);color:var(--gold);background:rgba(200,160,78,.06);}
  .vitem.playing .vitem-icon{border-color:var(--gold);color:var(--gold);background:rgba(200,160,78,.1);}
  .vitem-info{flex:1;}
  .vitem-title{font-size:13.5px;letter-spacing:.4px;color:var(--white);opacity:.85;line-height:1.45;}
  .vitem-meta{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:3px;}
  .vitem-dur{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:2px;color:var(--muted);}
  .player-overlay{position:fixed;inset:0;z-index:500;background:rgba(3,2,8,.97);backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .35s ease;padding:20px;}
  .player-overlay.open{opacity:1;pointer-events:all;}
  .player-top{width:100%;max-width:720px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-shrink:0;}
  .player-back{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);background:none;border:1px solid rgba(255,255,255,.06);border-radius:2px;padding:8px 14px;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:8px;}
  .player-back:hover{color:var(--gold);border-color:var(--gold-border);}
  .player-title{font-family:'Playfair Display',serif;font-size:1rem;letter-spacing:1px;color:var(--white);opacity:.75;text-align:center;flex:1;padding:0 12px;}
  .player-close{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .25s;font-size:.9rem;}
  .player-close:hover{background:rgba(200,160,78,.1);border-color:var(--gold-border);color:var(--gold);}
  .player-wrap{width:100%;max-width:720px;border-radius:4px;overflow:hidden;border:1px solid rgba(200,160,78,.18);position:relative;box-shadow:0 0 80px rgba(0,0,0,.8),0 0 40px rgba(200,160,78,.06);flex-shrink:0;}
  .player-wrap iframe{display:block;width:100%;aspect-ratio:16/9;border:none;}
  .player-nav{width:100%;max-width:720px;display:flex;align-items:center;justify-content:space-between;margin-top:16px;gap:10px;flex-shrink:0;}
  .player-nav-btn{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:3px;text-transform:uppercase;padding:10px 18px;border:1px solid rgba(255,255,255,.06);border-radius:2px;background:rgba(255,255,255,.02);color:var(--muted);cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:8px;}
  .player-nav-btn:hover{color:var(--gold);border-color:var(--gold-border);background:rgba(200,160,78,.04);}
  .player-nav-btn:disabled{opacity:.2;cursor:default;}
  .player-nav-info{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);text-align:center;}
  @keyframes riseIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .d1{animation-delay:.1s;}.d2{animation-delay:.22s;}.d3{animation-delay:.34s;}.d4{animation-delay:.46s;}
  </style>
</head>
<body>

<div class="amb"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>
<div class="grid-veil"></div>

<div id="ls"><span class="ls-sym">✦</span><span class="ls-txt">Verificando acesso…</span></div>

<nav>
  <a href="/dashboard/" class="nav-logo">
    <img src="https://res.cloudinary.com/dcbarseus/image/upload/v1773707211/IMG_20260104_135834_828_nsimow.webp" alt="Logo">
    <span>AK<b>A</b>SHA <b>HUB</b></span>
  </a>
  <a href="/dashboard/" class="back">← Dashboard</a>
</nav>

<main>
  <div class="page-header">
    <span class="page-eyebrow">𓂀 Sua Jornada</span>
    <h1 class="page-title"><em>Área de</em> Membros</h1>
    <p class="page-sub">Selecione seu nível de acesso para começar ou continuar sua jornada.</p>
  </div>

  <div class="user-strip" id="userStrip" style="display:none;">
    <div class="user-avatar" id="userAvatar">A</div>
    <div class="user-info">
      <span class="user-name" id="userName">Membro</span>
      <span class="user-nivel" id="userNivel">Carregando…</span>
    </div>
    <button class="user-logout" id="logoutBtn">Sair</button>
  </div>

  <div class="divider"><div class="div-line"></div><div class="div-gem"></div><div class="div-line"></div></div>
  <div class="sec-lbl"><span>Escolha seu nível</span></div>
  <div class="levels" id="levelsWrap"></div>
</main>

<div class="content-overlay" id="contentOverlay">
  <div class="content-sheet" id="contentSheet">
    <div class="cs-bg"></div>
    <div class="cs-grid"></div>
    <div class="cs-handle">
      <div class="cs-pill"></div>
      <div class="cs-toprow">
        <span class="cs-badge" id="csLevelBadge">✦ Nível 1 · Anúbis</span>
        <button class="cs-close" onclick="closeContent()" aria-label="Fechar">✕</button>
      </div>

];

let userNivel   = 0;
let userDoc     = {};
let currentLvl  = null;
let openModIdx  = null;

onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = '/login/'; return; }
  currentUser = user;

  const snap = await getDoc(doc(db, 'users', user.uid));
  if (snap.exists()) {
    userDoc   = snap.data();
    userNivel = userDoc.nivel ?? 0;
  } else {
    userDoc = { email: user.email, nivel: 0, criadoEm: new Date() };
    await setDoc(doc(db, 'users', user.uid), userDoc);
  }

  const strip = document.getElementById('userStrip');
  strip.style.display = 'flex';
  document.getElementById('userAvatar').textContent =
    (user.displayName || user.email || 'M')[0].toUpperCase();
  document.getElementById('userName').textContent =
    user.displayName || user.email || 'Membro';

  const nivelNames = [
    'Sem acesso',
    'Anúbis — Iniciado(a)',
    'Hórus — Despertar',
    'Ísis — Domínio',
    'Rá — Magnetismo Supremo'
  ];
  document.getElementById('userNivel').textContent =
    '✦ ' + (nivelNames[userNivel] || 'Sem acesso');

  renderLevels();
  document.getElementById('ls').classList.add('hide');
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await signOut(auth);
  window.location.href = '/login/';
});

function renderLevels() {
  const wrap = document.getElementById('levelsWrap');
  wrap.innerHTML = '';
  LEVELS_META.forEach((lv, i) => {
    const ok  = userNivel >= lv.num;
    const cur = userNivel === lv.num;
    const c   = CONTEUDO[lv.num];
    const totalAulas = c.modules.reduce((s,m) => s + m.aulas.length, 0);

    const el = document.createElement('div');
    el.className = `lv ${lv.classe} d${i+1} ${ok ? '' : 'locked'}`;
    el.innerHTML = `
      <div class="lv-inner">
        <div class="lv-left">
          <div class="lv-orb">${lv.num}</div>
          <div class="lv-info">
            <span class="lv-tag">Nível 0${lv.num} · ${c.subtitulo}</span>
            <div class="lv-name">${c.nome}</div>
            <div class="lv-desc">${c.desc}</div>
            <div class="lv-count">${c.modules.length} módulos · ${totalAulas} aulas</div>
          </div>
        </div>
        <div class="lv-right">
          ${cur ? '<span class="badge-cur">Seu nível</span>' : ''}
          ${ok  ? '<span class="badge-open">›</span>' : '<span class="badge-lock">🔒</span>'}
        </div>
      </div>`;

    if (ok) el.addEventListener('click', () => openContent(lv.num));
    wrap.appendChild(el);
  });
}

function openContent(nivel) {
  currentLvl = nivel;
  openModIdx = null;
  const c = CONTEUDO[nivel];

  document.getElementById('csLevelBadge').textContent = `✦ ${c.nome}`;
  document.getElementById('csTag').textContent = c.subtitulo;
  document.getElementById('csTag').style.color = c.cor;
  document.getElementById('csTitle').innerHTML = `<em>${c.nome}</em>`;
  document.getElementById('csTitle').querySelector('em').style.color = c.cor;
  document.getElementById('csDesc').textContent = c.desc;
  document.getElementById('csProgressFill').style.background = c.corFill;

  const watched   = (userDoc.watched || {})[nivel] || {};
  const totalVids = c.modules.reduce((s,m) => s + m.aulas.length, 0);
  const doneVids  = Object.keys(watched).length;
  const pct = totalVids > 0 ? Math.round((doneVids / totalVids) * 100) : 0;
  document.getElementById('csProgressPct').textContent = pct + '%';
  document.getElementById('csProgressFill').style.width = pct + '%';

  playerQueue = [];
  c.modules.forEach((mod, mi) => {
    mod.aulas.forEach((a, ai) => {
      playerQueue.push({ modIdx: mi, aulIdx: ai, ...a });
    });
  });

  renderModules(nivel, c, watched);
  document.getElementById('contentOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderModules(nivel, c, watched) {
  const wrap = document.getElementById('modulesWrap');
  wrap.innerHTML = '';
  c.modules.forEach((mod, mi) => {
    const modEl = document.createElement('div');
    modEl.className = 'module';
    modEl.id = `mod-${mi}`;

    const watchedInMod = mod.aulas.filter((_,ai) => watched[`${mi}-${ai}`]).length;

    modEl.innerHTML = `
      <div class="module-head" onclick="toggleModule(${mi})">
        <span class="module-num">0${mi+1}</span>
        <span class="module-name">${mod.nome}</span>
        <span class="module-count">${watchedInMod}/${mod.aulas.length} aulas</span>
        <span class="module-chevron">›</span>
        <div class="module-line"></div>
      </div>
      <div class="video-list" id="vlist-${mi}">
        ${mod.aulas.map((a, ai) => {
          const key  = `${mi}-${ai}`;
          const done = !!watched[key];
          const qIdx = playerQueue.findIndex(q => q.modIdx === mi && q.aulIdx === ai);
          return `
          <div class="vitem ${done ? 'watched' : ''}" id="vitem-${mi}-${ai}" onclick="openVideo(${qIdx})">
            <div class="vitem-icon">${done ? '✓' : '▶'}</div>
            <div class="vitem-info">
              <div class="vitem-title">${a.titulo}</div>
              <div class="vitem-meta">${done ? 'Concluída' : 'Disponível'}</div>
            </div>
            <span class="vitem-dur">${a.duracao}</span>
          </div>`;
        }).join('')}
      </div>`;
    wrap.appendChild(modEl);
  });
}

window.toggleModule = function(idx) {
  const mod = document.getElementById(`mod-${idx}`);
  if (!mod) return;
  const isOpen = mod.classList.contains('open');
  document.querySelectorAll('.module.open').forEach(m => m.classList.remove('open'));
  if (!isOpen) { mod.classList.add('open'); openModIdx = idx; }
};

window.closeContent = function() {
  document.getElementById('contentOverlay').classList.remove('open');
  document.body.style.overflow = '';
  currentLvl = null;
};

window.openVideo = function(queueIdx) {
  if (queueIdx < 0 || queueIdx >= playerQueue.length) return;
  playerIdx = queueIdx;
  const v = playerQueue[queueIdx];

  document.querySelectorAll('.vitem.playing').forEach(el => el.classList.remove('playing'));
  const vEl = document.getElementById(`vitem-${v.modIdx}-${v.aulIdx}`);
  if (vEl) vEl.classList.add('playing');

  document.getElementById('playerFrame').src =
    `https://www.youtube-nocookie.com/embed/${v.ytId}?autoplay=1&rel=0&modestbranding=1&cc_load_policy=0`;
  document.getElementById('playerTitle').textContent = v.titulo;
  document.getElementById('playerNavInfo').textContent = `${queueIdx + 1} / ${playerQueue.length}`;
  document.getElementById('prevVideoBtn').disabled = queueIdx === 0;
  document.getElementById('nextVideoBtn').disabled = queueIdx === playerQueue.length - 1;

  document.getElementById('playerOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  markWatched(currentLvl, v.modIdx, v.aulIdx);
};

window.closePlayer = function() {
  document.getElementById('playerOverlay').classList.remove('open');
  document.getElementById('playerFrame').src = '';
};

window.navigateVideo = function(dir) {
  const next = playerIdx + dir;
  if (next >= 0 && next < playerQueue.length) openVideo(next);
};

async function markWatched(nivel, modIdx, aulIdx) {
  if (!currentUser) return;
  const key = `${modIdx}-${aulIdx}`;
  if (!userDoc.watched) userDoc.watched = {};
  if (!userDoc.watched[nivel]) userDoc.watched[nivel] = {};
  if (userDoc.watched[nivel][key]) return;

  userDoc.watched[nivel][key] = true;
  try {
    await updateDoc(doc(db, 'users', currentUser.uid), {
      [`watched.${nivel}.${key}`]: true
    });
  } catch(e) { console.warn('Firestore update failed:', e); }

  const vEl = document.getElementById(`vitem-${modIdx}-${aulIdx}`);
  if (vEl) {
    vEl.classList.add('watched');
    const icon = vEl.querySelector('.vitem-icon');
    if (icon) icon.textContent = '✓';
    const meta = vEl.querySelector('.vitem-meta');
    if (meta) meta.textContent = 'Concluída';
  }

  const c       = CONTEUDO[nivel];
  const watched = userDoc.watched[nivel] || {};
  const total   = c.modules.reduce((s,m) => s + m.aulas.length, 0);
  const done    = Object.keys(watched).length;
  const pct     = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('csProgressPct').textContent = pct + '%';
  document.getElementById('csProgressFill').style.width = pct + '%';

  const modEl = document.getElementById(`mod-${modIdx}`);
  if (modEl) {
    const mod   = c.modules[modIdx];
    const mDone = mod.aulas.filter((_,ai) => watched[`${modIdx}-${ai}`]).length;
    const cnt   = modEl.querySelector('.module-count');
    if (cnt) cnt.textContent = `${mDone}/${mod.aulas.length} aulas`;
  }
}

/* Touch drag to close */
(function(){
  const sheet = document.getElementById('contentSheet');
  const body  = sheet.querySelector('.cs-body');
  let sy = 0, dragging = false;
  sheet.addEventListener('touchstart', e => {
    if (body.scrollTop > 0) return;
    sy = e.touches[0].clientY; dragging = true;
  }, { passive: true });
  sheet.addEventListener('touchmove', e => {
    if (!dragging) return;
    const dy = e.touches[0].clientY - sy;
    if (dy > 0) sheet.style.transform = `translateY(${dy}px)`;
  }, { passive: true });
  sheet.addEventListener('touchend', e => {
    if (!dragging) return;
    dragging = false;
    const dy = e.changedTouches[0].clientY - sy;
    if (dy > 90) closeContent();
    sheet.style.transform = '';
  });
})();

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('playerOverlay').classList.contains('open')) closePlayer();
    else if (document.getElementById('contentOverlay').classList.contains('open')) closeContent();
  }
});

document.getElementById('contentOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeContent();
});
</script>
