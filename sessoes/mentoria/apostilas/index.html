<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akasha Hub | Mentoria — Encontros</title>
<link rel="icon" type="image/webp" href="https://res.cloudinary.com/dcbarseus/image/upload/v1773707211/IMG_20260104_135834_828_nsimow.webp">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@100;300;400&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   TOKENS
══════════════════════════════════════ */
:root {
  --bg:      #06050a;
  --sur:     #0e0c17;
  --sur2:    #13101e;
  --gold:    #c9a227;
  --gold-lt: #f0d078;
  --gb:      rgba(201,162,39,.24);
  --gb-soft: rgba(201,162,39,.07);
  --white:   #f5f0e8;
  --muted:   rgba(245,240,232,.40);
  --dim:     rgba(245,240,232,.18);
  --purple:  #7c4dbd;
  --pur-lt:  #a67fdc;
  --pur-b:   rgba(166,127,220,.28);
  --pur-s:   rgba(166,127,220,.07);
  --green:   #25d366;
  --done:    rgba(74,222,128,.75);
  --done-b:  rgba(74,222,128,.18);
  --done-bg: rgba(74,222,128,.04);
  --r:       4px;
  --r-lg:    10px;
  --nav-h:   62px;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body {
  background:var(--bg); color:var(--white);
  font-family:'Josefin Sans',sans-serif; font-weight:300;
  min-height:100vh; overflow-x:hidden;
}

/* ambient */
body::before {
  content:''; position:fixed; top:-15%; left:50%; transform:translateX(-50%);
  width:900px; height:700px;
  background:radial-gradient(ellipse,rgba(124,77,189,.07) 0%,rgba(201,162,39,.03) 55%,transparent 72%);
  pointer-events:none; animation:breathe 14s ease-in-out infinite; z-index:0;
}
@keyframes breathe { 0%,100%{opacity:.55;} 50%{opacity:1;} }

/* ══════════════════════════════════════
   NAV
══════════════════════════════════════ */
nav {
  position:fixed; top:0; left:0; right:0; z-index:300;
  height:var(--nav-h);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 28px;
  background:rgba(6,5,10,.94); backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,.05);
}
.nav-logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
.nav-logo img { width:34px; height:34px; border-radius:50%; filter:drop-shadow(0 0 6px rgba(201,162,39,.35)); }
.nav-logo-txt { font-family:'Cormorant Garamond',serif; font-size:1.05rem; letter-spacing:4px; color:var(--white); }
.nav-logo-txt b { color:var(--gold-lt); font-weight:400; }
.nav-right { display:flex; align-items:center; gap:12px; }
.nav-back {
  font-size:.5rem; letter-spacing:4px; text-transform:uppercase;
  color:var(--muted); text-decoration:none; transition:color .25s;
  padding:7px 14px; border-radius:20px; border:1px solid transparent;
}
.nav-back:hover { color:var(--gold); border-color:var(--gb); background:var(--gb-soft); }
.nav-user {
  font-size:.48rem; letter-spacing:3px; text-transform:uppercase;
  color:var(--pur-lt); border:1px solid var(--pur-b); padding:6px 14px;
  border-radius:20px; background:var(--pur-s);
}

/* ══════════════════════════════════════
   LOADING
══════════════════════════════════════ */
#ls {
  position:fixed; inset:0; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:16px; z-index:999; transition:opacity .5s;
}
#ls.hide { opacity:0; pointer-events:none; }
#ls-logo { width:48px; height:48px; border-radius:50%; filter:drop-shadow(0 0 12px rgba(201,162,39,.4)); }
#ls span {
  font-size:.52rem; letter-spacing:6px; text-transform:uppercase;
  color:var(--gold); opacity:.55; animation:pulse 1.6s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:.25;} 50%{opacity:.8;} }
@keyframes fadeUp { from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:translateY(0);} }

/* ══════════════════════════════════════
   MAIN
══════════════════════════════════════ */
main {
  position:relative; z-index:1;
  max-width:700px; margin:0 auto;
  padding:calc(var(--nav-h) + 36px) 22px 100px;
}

/* Page header */
.page-header { margin-bottom:40px; animation:fadeUp .8s ease both; }
.page-eyebrow {
  font-size:.48rem; letter-spacing:6px; text-transform:uppercase;
  color:var(--pur-lt); opacity:.7; margin-bottom:12px; display:block;
}
.page-title {
  font-family:'Cormorant Garamond',serif; font-weight:300;
  font-size:2.5rem; letter-spacing:3px; line-height:1.05;
}
.page-title em { font-style:italic; color:var(--gold-lt); }
.page-sub {
  font-size:.58rem; letter-spacing:3px; text-transform:uppercase;
  color:var(--muted); margin-top:12px; line-height:2.1;
}

/* Progress */
.progress-wrap { margin-bottom:36px; animation:fadeUp .6s .1s ease both; opacity:0; }
.progress-row {
  display:flex; justify-content:space-between;
  font-size:.48rem; letter-spacing:4px; text-transform:uppercase;
  color:var(--muted); margin-bottom:9px;
}
.progress-row span:last-child { color:var(--pur-lt); }
.progress-track {
  height:3px; background:rgba(255,255,255,.06); border-radius:3px; overflow:hidden;
}
.progress-fill {
  height:100%;
  background:linear-gradient(90deg,var(--purple),var(--pur-lt),var(--gold-lt));
  border-radius:3px; transition:width .9s cubic-bezier(.25,1,.5,1);
  width:0%;
}

/* ══════════════════════════════════════
   PILAR SECTIONS
══════════════════════════════════════ */
.pilar-block { margin-bottom:32px; animation:fadeUp .6s ease both; opacity:0; }
.pilar-header {
  display:flex; align-items:center; gap:14px;
  margin-bottom:14px;
}
.pilar-num {
  font-size:.42rem; letter-spacing:4px; text-transform:uppercase;
  color:var(--pur-lt); opacity:.55; white-space:nowrap;
}
.pilar-name {
  font-size:.48rem; letter-spacing:4px; text-transform:uppercase;
  color:var(--pur-lt); opacity:.7; white-space:nowrap;
}
.pilar-line { flex:1; height:1px; background:linear-gradient(90deg,var(--pur-b),transparent); }

/* ══════════════════════════════════════
   ENCONTRO CARD (list item)
══════════════════════════════════════ */
.enc-card {
  width:100%; display:flex; align-items:center; justify-content:space-between;
  padding:16px 20px; margin-bottom:6px;
  background:rgba(255,255,255,.022); border:1px solid rgba(255,255,255,.05);
  border-radius:var(--r); cursor:pointer;
  transition:all .28s cubic-bezier(.25,1,.5,1);
  position:relative; overflow:hidden; text-align:left;
}
.enc-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:0;
  background:linear-gradient(180deg,var(--purple),var(--pur-lt));
  transition:width .28s;
}
.enc-card:hover { border-color:var(--pur-b); background:var(--pur-s); transform:translateX(3px); }
.enc-card:hover::before { width:2px; }
.enc-card.done { border-color:var(--done-b); background:var(--done-bg); }
.enc-card.done::before { width:2px; background:var(--done); }

.enc-left { display:flex; align-items:center; gap:14px; }
.enc-num {
  width:36px; height:36px; border-radius:50%; flex-shrink:0;
  border:1px solid var(--pur-b); background:var(--pur-s);
  display:flex; align-items:center; justify-content:center;
  font-family:'Cormorant Garamond',serif; font-size:.95rem;
  color:var(--pur-lt);
}
.enc-card.done .enc-num {
  border-color:var(--done-b); background:var(--done-bg); color:var(--done);
}
.enc-info {}
.enc-title {
  font-family:'Cormorant Garamond',serif; font-size:1rem;
  letter-spacing:1.5px; line-height:1.2; color:var(--white);
}
.enc-sub {
  font-size:.44rem; letter-spacing:3px; text-transform:uppercase;
  margin-top:3px;
}
.enc-sub.pending { color:var(--muted); }
.enc-sub.done-lbl { color:var(--done); }
.enc-arrow { font-size:.85rem; color:var(--pur-lt); opacity:.45; flex-shrink:0; }
.enc-card.done .enc-arrow { color:var(--done); opacity:.6; }

/* ══════════════════════════════════════
   MODAL — Drawer estilo WhatsApp
══════════════════════════════════════ */
.modal-backdrop {
  position:fixed; inset:0; z-index:400;
  background:rgba(4,3,9,.82); backdrop-filter:blur(10px);
  opacity:0; pointer-events:none; transition:opacity .32s;
}
.modal-backdrop.open { opacity:1; pointer-events:all; }

.modal-drawer {
  position:fixed; bottom:0; left:0; right:0; z-index:401;
  max-width:680px; margin:0 auto;
  max-height:92vh;
  background:linear-gradient(165deg, #0f0c1c 0%, #09071a 100%);
  border:1px solid var(--pur-b); border-bottom:none;
  border-radius:18px 18px 0 0;
  display:flex; flex-direction:column;
  transform:translateY(100%); transition:transform .42s cubic-bezier(.16,1,.3,1);
  overflow:hidden;
}
.modal-backdrop.open .modal-drawer { transform:translateY(0); }

/* Decorative corners */
.modal-drawer::before {
  content:''; position:absolute; top:0; left:0; width:22px; height:22px;
  border-top:2px solid rgba(166,127,220,.45); border-left:2px solid rgba(166,127,220,.45);
  border-radius:16px 0 0 0; pointer-events:none; z-index:1;
}
.modal-drawer::after {
  content:''; position:absolute; top:0; right:0; width:22px; height:22px;
  border-top:2px solid rgba(166,127,220,.45); border-right:2px solid rgba(166,127,220,.45);
  border-radius:0 16px 0 0; pointer-events:none; z-index:1;
}

/* Glow BG */
.drawer-glow {
  position:absolute; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse at 15% 0%, rgba(124,77,189,.3) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 100%, rgba(201,162,39,.06) 0%, transparent 50%);
}

/* Handle */
.drawer-handle {
  position:relative; z-index:2; flex-shrink:0;
  display:flex; flex-direction:column; align-items:center;
  padding:12px 20px 0;
}
.drawer-pill {
  width:38px; height:4px; border-radius:2px;
  background:rgba(166,127,220,.3); margin-bottom:14px;
}
.drawer-toprow {
  width:100%; display:flex; align-items:center; justify-content:space-between;
  padding-bottom:14px; border-bottom:1px solid rgba(166,127,220,.1);
}
.drawer-badge {
  font-size:.42rem; letter-spacing:4px; text-transform:uppercase;
  color:rgba(166,127,220,.55);
}
.drawer-close {
  width:30px; height:30px; border-radius:8px;
  border:1px solid rgba(255,255,255,.09); background:rgba(255,255,255,.04);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:var(--muted); font-size:13px; transition:all .2s;
}
.drawer-close:hover { border-color:rgba(255,255,255,.2); color:var(--white); background:rgba(255,255,255,.08); }

/* Scrollable body */
.drawer-scroll {
  position:relative; z-index:2; flex:1; overflow-y:auto;
  padding:20px 22px 32px;
  scrollbar-width:thin; scrollbar-color:rgba(166,127,220,.2) transparent;
}
.drawer-scroll::-webkit-scrollbar { width:4px; }
.drawer-scroll::-webkit-scrollbar-thumb { background:rgba(166,127,220,.2); border-radius:2px; }

/* Encontro header inside modal */
.modal-enc-num {
  font-size:.42rem; letter-spacing:5px; text-transform:uppercase;
  color:var(--pur-lt); opacity:.6; display:block; margin-bottom:8px;
}
.modal-enc-title {
  font-family:'Cormorant Garamond',serif; font-weight:400;
  font-size:1.9rem; letter-spacing:2px; line-height:1.1; color:var(--white);
  margin-bottom:6px;
}
.modal-enc-title em { font-style:italic; color:var(--gold-lt); }
.modal-enc-pilar {
  font-size:.44rem; letter-spacing:4px; text-transform:uppercase;
  color:var(--pur-lt); opacity:.55; margin-bottom:20px; display:block;
}

/* Divider */
.modal-div {
  display:flex; align-items:center; gap:12px; margin-bottom:22px;
}
.modal-div-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(201,162,39,.2),transparent); }
.modal-div-sym { font-size:.6rem; color:var(--gold); opacity:.4; }

/* Section label */
.sec-label {
  font-size:.45rem; letter-spacing:5px; text-transform:uppercase;
  color:var(--gold); opacity:.6; margin-bottom:14px;
  display:flex; align-items:center; gap:10px;
}
.sec-label::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--gb),transparent); }

/* Mergulho (intro text) */
.mergulho-box {
  background:linear-gradient(105deg,rgba(201,162,39,.05) 0%,transparent 70%);
  border:1px solid rgba(201,162,39,.12); border-radius:var(--r);
  padding:16px 18px; margin-bottom:22px;
}
.mergulho-txt {
  font-family:'Cormorant Garamond',serif; font-size:1rem;
  letter-spacing:.5px; line-height:1.85; color:rgba(245,240,232,.72);
}

/* Perguntas */
.perguntas-list { display:flex; flex-direction:column; gap:14px; margin-bottom:24px; }
.pergunta-item {}
.pergunta-q {
  font-family:'Cormorant Garamond',serif; font-size:.98rem;
  letter-spacing:.5px; line-height:1.55; color:var(--white);
  margin-bottom:8px; display:flex; gap:10px;
}
.pq-num {
  font-size:.55rem; letter-spacing:2px; color:var(--pur-lt);
  opacity:.6; flex-shrink:0; margin-top:3px; font-family:'Josefin Sans',sans-serif;
}
textarea.resp-input {
  width:100%; background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.07); border-radius:var(--r);
  padding:12px 14px; color:var(--white);
  font-family:'Josefin Sans',sans-serif; font-weight:300;
  font-size:.78rem; line-height:1.8; letter-spacing:.3px;
  resize:vertical; min-height:90px;
  transition:border-color .25s; outline:none;
}
textarea.resp-input:focus { border-color:var(--pur-b); }
textarea.resp-input::placeholder { color:var(--dim); }

/* Tarefas */
.tarefas-box {
  background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.06);
  border-radius:var(--r); padding:16px 18px; margin-bottom:24px;
}
.tarefa-item {
  display:flex; align-items:flex-start; gap:10px;
  font-size:.78rem; letter-spacing:.4px; line-height:1.75;
  color:var(--muted); margin-bottom:8px;
}
.tarefa-item:last-child { margin-bottom:0; }
.tarefa-bullet {
  color:var(--pur-lt); opacity:.7; flex-shrink:0; font-size:.55rem; margin-top:5px;
}

/* Insight akáshico */
.insight-box {
  background:linear-gradient(105deg,rgba(124,77,189,.08) 0%,rgba(201,162,39,.03) 70%);
  border:1px solid var(--pur-b); border-radius:var(--r);
  padding:18px 20px; margin-bottom:28px; position:relative;
}
.insight-box::before {
  content:'𓂀'; position:absolute; top:14px; right:16px;
  font-size:1rem; color:var(--pur-lt); opacity:.25;
}
.insight-quote {
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:1rem; letter-spacing:.6px; line-height:1.85;
  color:rgba(245,240,232,.62);
}
.insight-source {
  font-size:.42rem; letter-spacing:4px; text-transform:uppercase;
  color:var(--pur-lt); opacity:.45; margin-top:10px; display:block;
}

/* Anotações pessoais */
textarea.anotacoes-input {
  width:100%; background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.07); border-radius:var(--r);
  padding:14px 16px; color:var(--white);
  font-family:'Josefin Sans',sans-serif; font-weight:300;
  font-size:.78rem; line-height:1.85; letter-spacing:.3px;
  resize:vertical; min-height:110px;
  transition:border-color .25s; outline:none; margin-bottom:16px;
}
textarea.anotacoes-input:focus { border-color:var(--gb); }
textarea.anotacoes-input::placeholder { color:var(--dim); }

/* Ações */
.modal-actions {
  display:flex; gap:10px; flex-wrap:wrap; align-items:center;
}
.btn-salvar {
  height:40px; padding:0 22px;
  background:none; border:1px solid var(--pur-b); border-radius:20px;
  color:var(--pur-lt); font-family:'Josefin Sans',sans-serif;
  font-size:.48rem; letter-spacing:4px; text-transform:uppercase;
  cursor:pointer; transition:all .25s; display:flex; align-items:center; gap:7px;
}
.btn-salvar:hover { background:var(--pur-s); border-color:rgba(166,127,220,.55); }
.btn-wpp {
  height:40px; padding:0 20px;
  background:rgba(37,211,102,.06); border:1px solid rgba(37,211,102,.25); border-radius:20px;
  color:var(--green); font-family:'Josefin Sans',sans-serif;
  font-size:.48rem; letter-spacing:4px; text-transform:uppercase;
  cursor:pointer; transition:all .25s; display:flex; align-items:center; gap:7px;
}
.btn-wpp:hover { background:rgba(37,211,102,.14); border-color:rgba(37,211,102,.5); }
.btn-wpp svg { width:13px; height:13px; fill:var(--green); flex-shrink:0; }
.save-status {
  font-size:.46rem; letter-spacing:3px; text-transform:uppercase;
  color:var(--muted); margin-left:4px;
}

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
.toast {
  position:fixed; bottom:22px; left:50%;
  transform:translateX(-50%) translateY(12px);
  background:rgba(10,9,16,.97); border:1px solid rgba(201,162,39,.22);
  border-radius:20px; padding:9px 22px;
  font-size:.46rem; letter-spacing:3px; text-transform:uppercase;
  color:var(--white); opacity:0; transition:all .28s;
  pointer-events:none; z-index:9999; white-space:nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* Delays */
.d1{animation-delay:.05s} .d2{animation-delay:.12s} .d3{animation-delay:.19s}
.d4{animation-delay:.26s} .d5{animation-delay:.33s}

/* Mobile */
@media(max-width:600px) {
  main { padding-top:calc(var(--nav-h) + 20px); padding-left:14px; padding-right:14px; }
  nav { padding:0 16px; }
  .modal-enc-title { font-size:1.55rem; }
  .drawer-scroll { padding:16px 16px 28px; }
}
</style>
</head>

/* ─── Auth guard ─── */
onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = '/login/'; return; }

  // Verifica acesso: admin ou tem_mentoria
  const snap = await getDoc(doc(db, "users", user.uid));
  const ud   = snap.exists() ? snap.data() : {};
  const isAdmin = user.uid === ADMIN_UID;

  if (!isAdmin && !ud.tem_mentoria) {
    window.location.href = '/sessoes/';
    return;
  }

  currentUser = user;

  // Exibe nome na nav
  const nome = user.displayName || user.email || 'Mentorando';
  const navUser = document.getElementById('navUser');
  navUser.textContent = nome.split(' ')[0];
  navUser.style.display = 'inline-block';

  // Carrega respostas salvas
  const rSnap = await getDoc(doc(db, `mentoria_respostas/${user.uid}/dados/tudo`));
  if (rSnap.exists()) respostas = rSnap.data() || {};

  renderLista();
  document.getElementById('ls').classList.add('hide');
});

/* ─── Render lista de encontros ─── */
function renderLista() {
  const container = document.getElementById('encontrosContainer');
  container.innerHTML = '';

  // Agrupar por pilar
  const pilares = {};
  ENCONTROS.forEach(enc => {
    if (!pilares[enc.pilar]) pilares[enc.pilar] = [];
    pilares[enc.pilar].push(enc);
  });

  let totalDone = 0;
  const delays = ['d1','d2','d3','d4','d5'];
  let dIdx = 0;

  Object.entries(pilares).forEach(([pilarNome, encs]) => {
    const block = document.createElement('div');
    block.className = `pilar-block ${delays[dIdx % 5]}`;
    dIdx++;

    // Pilar header
    const ph = document.createElement('div');
    ph.className = 'pilar-header';
    const pilarNum  = pilarNome.split('—')[0].trim();
    const pilarName = pilarNome.split('—')[1]?.trim() || pilarNome;
    ph.innerHTML = `
      <span class="pilar-num">${pilarNum}</span>
      <span class="pilar-name">${pilarName}</span>
      <div class="pilar-line"></div>`;
    block.appendChild(ph);

    // Encontros
    encs.forEach(enc => {
      const key   = `enc_${enc.num}`;
      const saved = respostas[key] || {};
      const done  = enc.perguntas.every((_, i) => (saved[`q${i}`] || '').trim().length > 0);
      if (done) totalDone++;

      const card = document.createElement('button');
      card.className = `enc-card${done ? ' done' : ''}`;
      card.dataset.num = enc.num;
      card.onclick = () => abrirEncontro(enc.num);
      card.innerHTML = `
        <div class="enc-left">
          <div class="enc-num">${done ? '✓' : enc.num}</div>
          <div class="enc-info">
            <div class="enc-title">${enc.titulo}</div>
            <div class="enc-sub ${done ? 'done-lbl' : 'pending'}">
              ${done ? 'Respondido ✓' : 'Aguardando resposta'}
            </div>
          </div>
        </div>
        <span class="enc-arrow">›</span>`;
      block.appendChild(card);
    });

    container.appendChild(block);
  });

  // Progress
  document.getElementById('progressTxt').textContent = `${totalDone} / 26 respondidos`;
  document.getElementById('progressFill').style.width = `${(totalDone / 26) * 100}%`;
}

/* ─── Fechar modal ─── */
window.fecharModal = () => {
  document.getElementById('modalBackdrop').classList.remove('open');
  document.body.style.overflow = '';
  encAtivo = null;
  renderLista(); // atualiza progresso e badges
};

window.closeModalOnBackdrop = (e) => {
  if (e.target === document.getElementById('modalBackdrop')) fecharModal();
};

// Swipe down to close
const drawer = document.getElementById('modalDrawer');
let swipeStartY = 0;
drawer.addEventListener('touchstart', e => {
  swipeStartY = e.touches[0].clientY;
}, { passive:true });
drawer.addEventListener('touchmove', e => {
  if (document.getElementById('drawerScroll').scrollTop > 0) return;
  const dy = e.touches[0].clientY - swipeStartY;
  if (dy > 0) drawer.style.transform = `translateY(${dy}px)`;
}, { passive:true });
drawer.addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - swipeStartY;
  drawer.style.transform = '';
  if (dy > 80) fecharModal();
});

/* ─── Auto-save debounced ─── */
window.autoSave = () => {
  clearTimeout(saveTimer);
  const s = document.getElementById('saveStatus');
  if (s) s.textContent = '...';
  saveTimer = setTimeout(() => salvar(true), 1500);
};

/* ─── Salvar respostas ─── */
window.salvar = async (silencioso = false) => {
  if (!currentUser || !encAtivo) return;
  const num = encAtivo.num;
  const key = `enc_${num}`;
  const dados = {};

  // Coleta perguntas
  encAtivo.perguntas.forEach((_, i) => {
    const el = document.getElementById(`resp_${num}_${i}`);
    dados[`q${i}`] = el ? el.value : '';
  });

  // Coleta anotações
  const anotEl = document.getElementById(`anotacoes_${num}`);
  dados.anotacoes = anotEl ? anotEl.value : '';

  // Merge local
  respostas[key] = dados;

  // Persiste no Firestore (sem Storage, só Firestore)
  try {
    await setDoc(
      doc(db, `mentoria_respostas/${currentUser.uid}/dados/tudo`),
      { ...respostas, _atualizado: serverTimestamp() },
      { merge: true }
    );
    const s = document.getElementById('saveStatus');
    if (s) s.textContent = '✓ Salvo';
    if (!silencioso) toast('✓ Respostas salvas com sucesso');
    setTimeout(() => { const s = document.getElementById('saveStatus'); if (s) s.textContent = ''; }, 2500);
  } catch(e) {
    const s = document.getElementById('saveStatus');
    if (s) s.textContent = '✗ Erro ao salvar';
    toast('Erro ao salvar. Verifique sua conexão.');
  }
};

/* ─── Enviar ao WhatsApp do mentor ─── */
window.enviarWpp = async () => {
  if (!currentUser || !encAtivo) return;
  await salvar(true);

  const enc  = encAtivo;
  const nome = currentUser.displayName || currentUser.email || 'Mentorando';
  const key  = `enc_${enc.num}`;
  const saved = respostas[key] || {};

  let msg = `✦ ENCONTRO ${enc.num} — ${enc.titulo.toUpperCase()}\n`;
  msg += `Mentorando: ${nome} (${currentUser.email})\n`;
  msg += `━━━━━━━━━━━━━━━━━━━━━━\n\n`;

  enc.perguntas.forEach((q, i) => {
    const resp = (saved[`q${i}`] || '').trim();
    msg += `❓ ${q}\n✍️ ${resp || '(sem resposta)'}\n\n`;
  });

  if ((saved.anotacoes || '').trim()) {
    msg += `📝 ANOTAÇÕES PESSOAIS:\n${saved.anotacoes}\n\n`;
  }

  msg += `━━━━━━━━━━━━━━━━━━━━━━\nakashahub.com.br ✦`;

  window.open(`https://wa.me/${WPP_NUM}?text=${encodeURIComponent(msg)}`, '_blank');
};

/* ─── Helpers ─── */
function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function toast(msg, d = 3000) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), d);
}
</script>
