<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akasha Hub | Perfil</title>
  <link rel="icon" type="image/webp" href="https://res.cloudinary.com/dcbarseus/image/upload/v1773707211/IMG_20260104_135834_828_nsimow.webp">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Josefin+Sans:wght@100;300;400&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#06050a;--gold:#c9a227;--gold-light:#f0d078;
      --gold-border:rgba(201,162,39,.3);--white:#f5f0e8;
      --muted:rgba(245,240,232,.35);--card:rgba(255,255,255,.025);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--white);font-family:'Josefin Sans',sans-serif;
      font-weight:300;min-height:100vh;overflow-x:hidden;}
    body::before{content:'';position:fixed;top:-20%;left:50%;transform:translateX(-50%);
      width:600px;height:600px;
      background:radial-gradient(ellipse,rgba(201,162,39,.06) 0%,transparent 65%);
      pointer-events:none;}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;
      justify-content:space-between;padding:18px 32px;background:rgba(6,5,10,.85);
      backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.04);}
    .nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
    .nav-logo img{width:36px;height:36px;border-radius:50%;filter:drop-shadow(0 0 6px rgba(201,162,39,.35));}
    .nav-logo span{font-family:'Cormorant Garamond',serif;font-size:1.1rem;letter-spacing:4px;color:var(--white);}
    .nav-logo span b{color:var(--gold-light);font-weight:400;}
    .back{font-size:.58rem;letter-spacing:4px;text-transform:uppercase;
      color:var(--muted);text-decoration:none;transition:color .3s;}
    .back:hover{color:var(--gold);}
    main{max-width:520px;margin:0 auto;padding:110px 24px 80px;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

    .top{display:flex;flex-direction:column;align-items:center;margin-bottom:48px;animation:fadeUp .8s ease both;}
    .avatar{width:88px;height:88px;border-radius:50%;border:1px solid var(--gold-border);
      background:rgba(201,162,39,.08);display:flex;align-items:center;justify-content:center;
      font-family:'Cormorant Garamond',serif;font-size:2rem;color:var(--gold-light);
      margin-bottom:20px;position:relative;}
    .avatar::before{content:'';position:absolute;inset:-6px;border-radius:50%;
      border:1px solid rgba(201,162,39,.1);}
    .p-name{font-family:'Cormorant Garamond',serif;font-weight:400;
      font-size:1.6rem;letter-spacing:3px;margin-bottom:6px;}
    .p-email{font-size:.6rem;letter-spacing:3px;color:var(--muted);}
    .p-badge{margin-top:16px;display:flex;align-items:center;gap:10px;
      background:rgba(201,162,39,.05);border:1px solid var(--gold-border);
      padding:10px 20px;border-radius:20px;}
    .p-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);
      box-shadow:0 0 8px rgba(201,162,39,.6);}
    .p-level{font-size:.6rem;letter-spacing:5px;text-transform:uppercase;color:var(--gold-light);}

    .sec{display:flex;align-items:center;gap:14px;margin:32px 0 14px;
      opacity:0;animation:fadeUp .6s ease forwards;}
    .sec span{font-size:.58rem;letter-spacing:5px;text-transform:uppercase;
      color:var(--gold);opacity:.55;white-space:nowrap;}
    .sec::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold-border),transparent);}

    .row{display:flex;justify-content:space-between;align-items:center;
      padding:16px 0;border-bottom:1px solid rgba(255,255,255,.04);
      opacity:0;animation:fadeUp .6s ease forwards;}
    .row:last-child{border-bottom:none;}
    .rk{font-size:.58rem;letter-spacing:4px;text-transform:uppercase;color:var(--muted);}
    .rv{font-size:.8rem;letter-spacing:2px;}

    .tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-end;max-width:60%;}
    .tag{font-size:.52rem;letter-spacing:3px;text-transform:uppercase;
      border:1px solid var(--gold-border);padding:4px 10px;border-radius:20px;color:var(--gold);}
    .no-tag{font-size:.6rem;color:rgba(255,255,255,.2);letter-spacing:2px;}

    .btn-logout{margin-top:48px;width:100%;padding:15px;background:none;
      border:1px solid rgba(255,255,255,.08);border-radius:2px;color:rgba(255,255,255,.25);
      cursor:pointer;font-family:'Josefin Sans',sans-serif;font-size:.6rem;letter-spacing:5px;
      text-transform:uppercase;transition:all .3s;opacity:0;animation:fadeUp .6s .7s ease forwards;}
    .btn-logout:hover{border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.5);}

    .d1{animation-delay:.1s;}.d2{animation-delay:.2s;}.d3{animation-delay:.3s;}
    .d4{animation-delay:.4s;}.d5{animation-delay:.5s;}.d6{animation-delay:.6s;}

    #ls{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;
      justify-content:center;z-index:999;transition:opacity .5s;}
    #ls.hide{opacity:0;pointer-events:none;}
    #ls span{font-size:.6rem;letter-spacing:6px;text-transform:uppercase;color:var(--gold);
      opacity:.5;animation:pulse 1.5s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:.3;}50%{opacity:.8;}}
  </style>
</head>
<body>
<div id="ls"><span>Carregando…</span></div>
<nav>
  <a href="/dashboard/" class="nav-logo">
    <img src="https://res.cloudinary.com/dcbarseus/image/upload/v1773707211/IMG_20260104_135834_828_nsimow.webp" alt="Logo">
    <span>AK<b>A</b>SHA <b>HUB</b></span>
  </a>
  <a href="/dashboard/" class="back">← Dashboard</a>
</nav>
<main>
  <div class="top">
    <div class="avatar" id="avatar">?</div>
    <div class="p-name" id="pNome">…</div>
    <div class="p-email" id="pEmail">…</div>
    <div class="p-badge"><div class="p-dot"></div><span class="p-level" id="pLevel">…</span></div>
  </div>

  <div class="sec d1"><span>Informações</span></div>
  <div class="row d2"><span class="rk">Nome</span><span class="rv" id="rNome">—</span></div>
  <div class="row d3"><span class="rk">E-mail</span><span class="rv" id="rEmail">—</span></div>
  <div class="row d4"><span class="rk">Nível</span><span class="rv" id="rNivel">—</span></div>
  <div class="row d5"><span class="rk">Membro desde</span><span class="rv" id="rData">—</span></div>

  <div class="sec d5"><span>Meus Produtos</span></div>
  <div class="row d6">
    <span class="rk">Acessos</span>
    <div class="tags" id="tags"><span class="no-tag">Nenhum produto ainda</span></div>
  </div>

  <button class="btn-logout" id="btnLogout">Sair da conta</button>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyAQXJDGfsd7RgcYKm9wfuh6nOth7dWo-v4",
    authDomain: "hub-akasha.firebaseapp.com",
    projectId: "hub-akasha",
    storageBucket: "hub-akasha.firebasestorage.app",
    messagingSenderId: "370851875474",
    appId: "1:370851875474:web:29b1ba3a76b0fed7d9344b"
  });

  const auth = getAuth(app);
  const db   = getFirestore(app);
  const NIVEIS = ['Visitante','Iniciado','Despertar','Domínio','Magnetismo Supremo'];

  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href = '/login/'; return; }
    const snap = await getDoc(doc(db,"users",user.uid));
    const ud   = snap.exists() ? snap.data() : { nivel:0, produtos:[] };
    const nivel = ud.nivel ?? 0;
    const nome  = user.displayName || ud.nome || 'Membro';

    document.getElementById('ls').classList.add('hide');
    document.getElementById('avatar').textContent = nome.charAt(0).toUpperCase();
    document.getElementById('pNome').textContent  = nome;
    document.getElementById('pEmail').textContent = user.email;
    document.getElementById('pLevel').textContent = NIVEIS[nivel] || 'Visitante';
    document.getElementById('rNome').textContent  = nome;
    document.getElementById('rEmail').textContent = user.email;
    document.getElementById('rNivel').textContent = `${nivel} — ${NIVEIS[nivel]||'Visitante'}`;

    if (ud.criadoEm) {
      const d = ud.criadoEm.toDate ? ud.criadoEm.toDate() : new Date(ud.criadoEm);
      document.getElementById('rData').textContent = d.toLocaleDateString('pt-BR');
    }

    const prods = ud.produtos ?? [];
    if (prods.length) {
      document.getElementById('tags').innerHTML = prods.map(p=>`<span class="tag">${p}</span>`).join('');
    }
  });

  document.getElementById('btnLogout').onclick = async () => {
    await signOut(auth);
    window.location.href = '/';
  };
</script>
</body>
</html>
