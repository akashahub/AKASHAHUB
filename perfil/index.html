<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akasha Hub | Entrar</title>
  <link rel="icon" type="image/webp" href="https://res.cloudinary.com/dcbarseus/image/upload/v1773707211/IMG_20260104_135834_828_nsimow.webp">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Josefin+Sans:wght@100;300;400&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#06050a;--gold:#c9a227;--gold-light:#f0d078;
      --gold-border:rgba(201,162,39,.3);--white:#f5f0e8;
      --muted:rgba(245,240,232,.4);--err:#e05a5a;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--white);font-family:'Josefin Sans',sans-serif;
      font-weight:300;min-height:100vh;display:flex;align-items:center;
      justify-content:center;overflow-x:hidden;}
    body::before{content:'';position:fixed;top:-20%;left:50%;transform:translateX(-50%);
      width:600px;height:600px;
      background:radial-gradient(ellipse,rgba(201,162,39,.07) 0%,transparent 65%);
      pointer-events:none;animation:breathe 8s ease-in-out infinite;}
    @keyframes breathe{0%,100%{opacity:.5;}50%{opacity:1;}}

    .wrap{position:relative;width:100%;max-width:420px;padding:48px 32px;
      display:flex;flex-direction:column;align-items:center;
      animation:fadeUp .8s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

    .logo-ring{width:80px;height:80px;border-radius:50%;border:1px solid var(--gold-border);
      display:flex;align-items:center;justify-content:center;margin-bottom:24px;
      background:radial-gradient(ellipse,rgba(201,162,39,.07) 0%,transparent 70%);position:relative;}
    .logo-ring::before{content:'';position:absolute;inset:-6px;border-radius:50%;
      border:1px solid rgba(201,162,39,.1);}
    .logo-ring img{width:56px;height:56px;object-fit:contain;border-radius:50%;
      filter:drop-shadow(0 0 10px rgba(201,162,39,.35));}

    h1{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:1.9rem;
      letter-spacing:5px;margin-bottom:6px;}
    h1 span{color:var(--gold-light);}
    .sub{font-size:.6rem;letter-spacing:5px;text-transform:uppercase;
      color:var(--gold);opacity:.7;margin-bottom:40px;}

    .tabs{display:flex;width:100%;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:32px;}
    .tab{flex:1;padding:12px;text-align:center;font-size:.65rem;letter-spacing:4px;
      text-transform:uppercase;color:var(--muted);cursor:pointer;
      border-bottom:2px solid transparent;transition:all .3s;}
    .tab.active{color:var(--gold-light);border-bottom-color:var(--gold);}

    .form{width:100%;display:none;flex-direction:column;gap:14px;}
    .form.active{display:flex;}

    .field{display:flex;flex-direction:column;gap:6px;}
    .field label{font-size:.58rem;letter-spacing:4px;text-transform:uppercase;
      color:var(--gold);opacity:.7;}
    .field input{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
      border-radius:2px;padding:13px 16px;color:var(--white);
      font-family:'Josefin Sans',sans-serif;font-size:.88rem;letter-spacing:1px;
      outline:none;transition:border-color .3s;}
    .field input:focus{border-color:var(--gold-border);}
    .field input::placeholder{color:rgba(255,255,255,.2);}

    .btn-primary{width:100%;padding:15px;
      background:linear-gradient(135deg,rgba(201,162,39,.15),rgba(201,162,39,.08));
      border:1px solid var(--gold-border);border-radius:2px;color:var(--gold-light);
      font-family:'Josefin Sans',sans-serif;font-size:.68rem;letter-spacing:5px;
      text-transform:uppercase;cursor:pointer;transition:all .35s;margin-top:4px;}
    .btn-primary:hover{background:rgba(201,162,39,.12);border-color:rgba(201,162,39,.6);transform:translateY(-1px);}

    .divider{display:flex;align-items:center;gap:14px;width:100%;margin:20px 0;}
    .divider-line{flex:1;height:1px;background:rgba(255,255,255,.07);}
    .divider span{font-size:.55rem;letter-spacing:3px;color:rgba(255,255,255,.2);text-transform:uppercase;}

    .btn-google{width:100%;padding:14px;background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.1);border-radius:2px;color:var(--muted);
      font-family:'Josefin Sans',sans-serif;font-size:.68rem;letter-spacing:4px;
      text-transform:uppercase;cursor:pointer;display:flex;align-items:center;
      justify-content:center;gap:12px;transition:all .3s;}
    .btn-google:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.2);color:var(--white);}
    .btn-google svg{width:16px;height:16px;flex-shrink:0;}

    .msg-error{display:none;background:rgba(224,90,90,.1);border:1px solid rgba(224,90,90,.3);
      border-radius:2px;padding:12px 16px;font-size:.7rem;letter-spacing:2px;
      color:var(--err);text-align:center;width:100%;}
    .msg-error.show{display:block;}
    .loading{display:none;font-size:.6rem;letter-spacing:4px;text-transform:uppercase;
      color:var(--gold);opacity:.6;text-align:center;padding:8px 0;}
    .loading.show{display:block;}

    .back-link{margin-top:32px;font-size:.58rem;letter-spacing:4px;text-transform:uppercase;
      color:rgba(255,255,255,.2);text-decoration:none;transition:color .3s;}
    .back-link:hover{color:var(--gold);}
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo-ring">
    <img src="https://res.cloudinary.com/dcbarseus/image/upload/v1773707211/IMG_20260104_135834_828_nsimow.webp" alt="Akasha Hub">
  </div>
  <h1>AK<span>A</span>SHA <span>HUB</span></h1>
  <p class="sub">Portal da Essência</p>

  <div class="tabs">
    <div class="tab active" data-tab="login">Entrar</div>
    <div class="tab" data-tab="cadastro">Cadastrar</div>
  </div>

  <div class="msg-error" id="msgError"></div>
  <div class="loading" id="loading">Aguarde…</div>

  <!-- LOGIN -->
  <div class="form active" id="formLogin">
    <div class="field"><label>E-mail</label>
      <input type="email" id="loginEmail" placeholder="seu@email.com"></div>
    <div class="field"><label>Senha</label>
      <input type="password" id="loginSenha" placeholder="••••••••"></div>
    <button class="btn-primary" id="btnLogin">Entrar</button>
    <div class="divider"><div class="divider-line"></div><span>ou</span><div class="divider-line"></div></div>
    <button class="btn-google" id="btnGoogle">
      <svg viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continuar com Google
    </button>
  </div>

  <!-- CADASTRO -->
  <div class="form" id="formCadastro">
    <div class="field"><label>Nome</label>
      <input type="text" id="cadNome" placeholder="Seu nome"></div>
    <div class="field"><label>E-mail</label>
      <input type="email" id="cadEmail" placeholder="seu@email.com"></div>
    <div class="field"><label>Senha</label>
      <input type="password" id="cadSenha" placeholder="mínimo 6 caracteres"></div>
    <button class="btn-primary" id="btnCadastrar">Criar conta</button>
    <div class="divider"><div class="divider-line"></div><span>ou</span><div class="divider-line"></div></div>
    <button class="btn-google" id="btnGoogleCad">
      <svg viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continuar com Google
    </button>
  </div>

  <a href="/" class="back-link">← voltar ao início</a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithPopup, signInWithEmailAndPassword,
    createUserWithEmailAndPassword, GoogleAuthProvider, updateProfile,
    onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyAQXJDGfsd7RgcYKm9wfuh6nOth7dWo-v4",
    authDomain: "hub-akasha.firebaseapp.com",
    projectId: "hub-akasha",
    storageBucket: "hub-akasha.firebasestorage.app",
    messagingSenderId: "370851875474",
    appId: "1:370851875474:web:29b1ba3a76b0fed7d9344b"
  });

  const auth = getAuth(app);
  const db   = getFirestore(app);
  const provider = new GoogleAuthProvider();

  // Se já logado, vai direto pro dashboard
  onAuthStateChanged(auth, user => {
    if (user) window.location.href = '/dashboard/';
  });

  async function ensureUser(user) {
    const ref  = doc(db, "users", user.uid);
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      await setDoc(ref, {
        nome: user.displayName || "",
        email: user.email,
        nivel: 0,
        produtos: [],
        criadoEm: new Date()
      });
    }
  }

  // Tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
      tab.classList.add('active');
      const id = 'form' + tab.dataset.tab.charAt(0).toUpperCase() + tab.dataset.tab.slice(1);
      document.getElementById(id).classList.add('active');
      hideErr();
    });
  });

  const ERROS = {
    'auth/user-not-found':'E-mail não encontrado.',
    'auth/wrong-password':'Senha incorreta.',
    'auth/invalid-email':'E-mail inválido.',
    'auth/email-already-in-use':'E-mail já em uso.',
    'auth/weak-password':'Senha fraca. Mínimo 6 caracteres.',
    'auth/popup-closed-by-user':'Login com Google cancelado.',
    'auth/invalid-credential':'E-mail ou senha incorretos.'
  };
  const showErr = m => { const e = document.getElementById('msgError'); e.textContent = m; e.classList.add('show'); };
  const hideErr = () => document.getElementById('msgError').classList.remove('show');
  const setLoad = v => document.getElementById('loading').classList.toggle('show', v);

  async function run(fn) {
    hideErr(); setLoad(true);
    try { await fn(); window.location.href = '/dashboard/'; }
    catch(e) { showErr(ERROS[e.code] || 'Ocorreu um erro. Tente novamente.'); }
    finally { setLoad(false); }
  }

  document.getElementById('btnLogin').onclick = () => run(async () => {
    const r = await signInWithEmailAndPassword(auth,
      document.getElementById('loginEmail').value.trim(),
      document.getElementById('loginSenha').value);
    await ensureUser(r.user);
  });

  document.getElementById('btnCadastrar').onclick = () => run(async () => {
    const nome = document.getElementById('cadNome').value.trim();
    const r = await createUserWithEmailAndPassword(auth,
      document.getElementById('cadEmail').value.trim(),
      document.getElementById('cadSenha').value);
    await updateProfile(r.user, { displayName: nome });
    await ensureUser({ ...r.user, displayName: nome });
  });

  const googleLogin = () => run(async () => {
    const r = await signInWithPopup(auth, provider);
    await ensureUser(r.user);
  });
  document.getElementById('btnGoogle').onclick = googleLogin;
  document.getElementById('btnGoogleCad').onclick = googleLogin;

  document.getElementById('loginSenha').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btnLogin').click();
  });
</script>
</body>
</html>
