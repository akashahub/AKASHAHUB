<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKASHAHUB — Portal de Consciência Expandida</title>
    <meta name="description" content="Hub espiritual premium. Acesse os níveis Anubis, Horus, Isis e Ra.">
    
    <!-- Google Fonts - Literature style -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --akasha-gold: #FFD700;
            --akasha-violet: #9D4EDD;
            --akasha-deep-violet: #5A189A;
            --akasha-black: #000000;
            --matrix-green: #00FF41;
            --text-light: #E0E0E0;
            --glow-gold: 0 0 30px rgba(255, 215, 0, 0.6), 0 0 60px rgba(255, 215, 0, 0.3);
            --glow-violet: 0 0 30px rgba(157, 78, 221, 0.6), 0 0 60px rgba(157, 78, 221, 0.3);
        }

        body {
            font-family: 'Cormorant Garamond', 'Libre Baskerville', serif;
            background: var(--akasha-black);
            color: var(--text-light);
            overflow-x: hidden;
            position: relative;
        }

        /* Matrix Rain Background */
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.15;
        }

        /* Scanlines Overlay */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            opacity: 0.3;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(15px);
            background: rgba(0, 0, 0, 0.85);
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 20px rgba(157, 78, 221, 0.2);
        }

        .logo-small {
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 4px;
            color: var(--akasha-gold);
            text-shadow: var(--glow-gold);
            font-family: 'Libre Baskerville', serif;
        }

        /* Main Navigation - PÁGINAS DE VENDAS */
        .header-right {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        nav {
            display: flex;
            gap: 2rem;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 2px;
            transition: all 0.4s ease;
            position: relative;
            font-family: 'Cormorant Garamond', serif;
            text-transform: uppercase;
        }

        nav a::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: var(--akasha-violet);
            border-radius: 50%;
            opacity: 0;
            transition: all 0.4s ease;
            box-shadow: var(--glow-violet);
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--akasha-gold), var(--akasha-violet));
            transition: width 0.4s ease;
            box-shadow: var(--glow-gold);
        }

        nav a:hover {
            color: var(--akasha-gold);
            text-shadow: var(--glow-gold);
        }

        nav a:hover::before {
            opacity: 1;
            top: -12px;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* Auth Buttons */
        .auth-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn-auth {
            padding: 0.8rem 1.8rem;
            border: 2px solid var(--akasha-gold);
            background: transparent;
            color: var(--akasha-gold);
            cursor: pointer;
            font-size: 0.9rem;
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-auth::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, var(--akasha-violet), transparent);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
            z-index: -1;
        }

        .btn-auth:hover {
            background: var(--akasha-gold);
            color: var(--akasha-black);
            box-shadow: var(--glow-gold);
            border-color: var(--akasha-violet);
        }

        .btn-auth:hover::before {
            width: 300px;
            height: 300px;
        }

        /* Mobile Menu Toggle */
        .mobile-menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            z-index: 1001;
        }

        .mobile-menu-toggle span {
            width: 25px;
            height: 3px;
            background: var(--akasha-gold);
            transition: all 0.3s ease;
            box-shadow: var(--glow-gold);
        }

        .mobile-menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(8px, 8px);
        }

        .mobile-menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .mobile-menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        /* Sidebar Levels - ÁREAS DE MEMBROS */
        .sidebar {
            position: fixed;
            left: 3rem;
            top: 50%;
            transform: translateY(-50%);
            z-index: 900;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .level-btn {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            padding: 1.2rem 2rem;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid rgba(255, 215, 0, 0.3);
            color: var(--text-light);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 3px;
            transition: all 0.5s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            text-transform: uppercase;
        }

        .level-btn::before {
            content: '';
            position: absolute;
            left: -100%;
            top: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(157, 78, 221, 0.3), transparent);
            transition: left 0.6s ease;
        }

        .level-btn:hover::before {
            left: 100%;
        }

        .level-btn:hover {
            border-color: var(--akasha-gold);
            background: rgba(157, 78, 221, 0.2);
            box-shadow: var(--glow-gold), inset 0 0 20px rgba(157, 78, 221, 0.3);
            transform: translateX(15px) scale(1.05);
            color: var(--akasha-gold);
        }

        /* Hieróglifos Egípcios Estilizados */
        .hieroglyph {
            font-size: 2rem;
            font-weight: bold;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.8));
            transition: all 0.4s ease;
            font-family: serif;
        }

        .level-btn:hover .hieroglyph {
            filter: drop-shadow(0 0 20px rgba(157, 78, 221, 1));
            transform: rotate(360deg) scale(1.2);
        }

        /* Hero Section */
        .hero {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .logo-container {
            position: relative;
            margin-bottom: 2rem;
        }

        .logo-main {
            max-width: 500px;
            width: 90%;
            filter: drop-shadow(var(--glow-gold)) drop-shadow(var(--glow-violet));
            animation: breathe 4s ease-in-out infinite, float 6s ease-in-out infinite;
        }

        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, rgba(157, 78, 221, 0.3), transparent 70%);
            animation: pulse 3s ease-in-out infinite;
            z-index: -1;
        }

        .tagline {
            font-size: 1.3rem;
            font-weight: 400;
            letter-spacing: 6px;
            color: var(--text-light);
            margin-top: 2rem;
            font-family: 'Libre Baskerville', serif;
            text-transform: uppercase;
            text-shadow: var(--glow-violet);
            animation: fadeInUp 2s ease-out;
        }

        @keyframes breathe {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.6)) drop-shadow(0 0 40px rgba(157, 78, 221, 0.4)); }
            50% { filter: drop-shadow(0 0 40px rgba(255, 215, 0, 0.9)) drop-shadow(0 0 60px rgba(157, 78, 221, 0.7)); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scroll hint */
        .scroll-hint {
            position: absolute;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            color: var(--akasha-gold);
            font-size: 1rem;
            letter-spacing: 3px;
            animation: floatHint 2s ease-in-out infinite;
            text-shadow: var(--glow-gold);
            font-family: 'Libre Baskerville', serif;
        }

        @keyframes floatHint {
            0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.6; }
            50% { transform: translateX(-50%) translateY(-15px); opacity: 1; }
        }

        /* Cyber Grid */
        .cyber-grid {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: 
                linear-gradient(0deg, transparent 24%, rgba(157, 78, 221, 0.05) 25%, rgba(157, 78, 221, 0.05) 26%, transparent 27%, transparent 74%, rgba(157, 78, 221, 0.05) 75%, rgba(157, 78, 221, 0.05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(255, 215, 0, 0.05) 25%, rgba(255, 215, 0, 0.05) 26%, transparent 27%, transparent 74%, rgba(255, 215, 0, 0.05) 75%, rgba(255, 215, 0, 0.05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: bottom;
            z-index: 0;
            opacity: 0.3;
        }

        /* ========== RESPONSIVE MOBILE ========== */
        @media (max-width: 1024px) {
            header {
                padding: 1.2rem 2rem;
            }

            nav {
                gap: 1.5rem;
            }

            nav a {
                font-size: 0.9rem;
            }

            .sidebar {
                left: 1.5rem;
            }

            .logo-main {
                max-width: 400px;
            }
        }

        @media (max-width: 768px) {
            header {
                padding: 1rem 1.5rem;
                flex-wrap: wrap;
            }

            .mobile-menu-toggle {
                display: flex;
            }

            .header-right {
                position: fixed;
                top: 0;
                right: -100%;
                width: 280px;
                height: 100vh;
                background: rgba(0, 0, 0, 0.98);
                backdrop-filter: blur(20px);
                flex-direction: column;
                justify-content: flex-start;
                padding: 5rem 2rem 2rem;
                gap: 2rem;
                transition: right 0.4s ease;
                border-left: 2px solid var(--akasha-gold);
                box-shadow: -5px 0 30px rgba(157, 78, 221, 0.5);
            }

            .header-right.active {
                right: 0;
            }

            nav {
                flex-direction: column;
                gap: 1.5rem;
                width: 100%;
            }

            nav a {
                font-size: 1.1rem;
                padding: 0.5rem 0;
                border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            }

            .auth-buttons {
                flex-direction: column;
                width: 100%;
            }

            .btn-auth {
                width: 100%;
                padding: 1rem;
            }

            /* Sidebar em Mobile - Horizontal na parte inferior */
            .sidebar {
                position: fixed;
                left: 0;
                right: 0;
                top: auto;
                bottom: 0;
                transform: none;
                flex-direction: row;
                justify-content: space-around;
                padding: 1rem;
                background: rgba(0, 0, 0, 0.95);
                backdrop-filter: blur(15px);
                border-top: 2px solid var(--akasha-gold);
                gap: 0.5rem;
                overflow-x: auto;
            }

            .level-btn {
                flex-direction: column;
                padding: 0.8rem 0.5rem;
                gap: 0.5rem;
                font-size: 0.7rem;
                letter-spacing: 1px;
                min-width: 70px;
                text-align: center;
            }

            .level-btn:hover {
                transform: translateY(-5px) scale(1.05);
            }

            .hieroglyph {
                font-size: 1.5rem;
            }

            .logo-main {
                max-width: 280px;
            }

            .tagline {
                font-size: 0.9rem;
                letter-spacing: 3px;
                padding: 0 1rem;
            }

            .scroll-hint {
                bottom: 8rem;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .logo-small {
                font-size: 1rem;
                letter-spacing: 2px;
            }

            .logo-main {
                max-width: 220px;
            }

            .tagline {
                font-size: 0.75rem;
                letter-spacing: 2px;
            }

            .level-btn {
                font-size: 0.65rem;
                padding: 0.6rem 0.3rem;
                min-width: 60px;
            }

            .hieroglyph {
                font-size: 1.2rem;
            }

            nav a {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- Matrix Rain Background -->
    <canvas id="matrixCanvas"></canvas>

    <!-- Scanlines -->
    <div class="scanlines"></div>

    <!-- Cyber Grid -->
    <div class="cyber-grid"></div>

    <!-- Header -->
    <header>
        <div class="logo-small">AKASHAHUB</div>
        
        <!-- Mobile Menu Toggle -->
        <div class="mobile-menu-toggle" onclick="toggleMobileMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <!-- Right Side: Navigation + Auth -->
        <div class="header-right">
            <nav>
                <a href="/livros">Livros</a>
                <a href="/mentoria">Mentoria</a>
                <a href="/partners">Partners</a>
                <a href="/store">Store</a>
                <a href="/vip">VIP</a>
                <a href="/doutrina">Doutrina</a>
                <a href="/vault">Vault</a>
            </nav>
            <div class="auth-buttons">
                <button class="btn-auth" onclick="openLogin()">Login</button>
                <button class="btn-auth" onclick="openSignup()">Cadastro</button>
            </div>
        </div>
    </header>

    <!-- Sidebar Levels - ÁREAS DE MEMBROS COM HIERÓGLIFOS -->
    <aside class="sidebar">
        <a href="https://pay.hotmart.com/N104491126Y" class="level-btn" target="_blank">
            <span class="hieroglyph">𓃣</span>
            <span>Anubis</span>
        </a>
        <a href="https://pay.hotmart.com/O104491171B?bid=1772004908360" class="level-btn" target="_blank">
            <span class="hieroglyph">𓅃</span>
            <span>Horus</span>
        </a>
        <a href="https://pay.hotmart.com/L104491291E" class="level-btn" target="_blank">
            <span class="hieroglyph">𓁐</span>
            <span>Isis</span>
        </a>
        <a href="https://pay.hotmart.com/F104491235U?bid=1772004998854" class="level-btn" target="_blank">
            <span class="hieroglyph">𓇳</span>
            <span>Ra</span>
        </a>
    </aside>

    <!-- Hero -->
    <section class="hero">
        <div class="logo-container">
            <div class="logo-glow"></div>
            <img src="https://res.cloudinary.com/dcbarseus/image/upload/v1771197016/IMG_20260104_135834_828_1_rnj2cs.png" alt="AKASHAHUB" class="logo-main">
        </div>
        <p class="tagline">Portal de Consciência Expandida</p>
        <div class="scroll-hint">↓ EXPLORE ↓</div>
    </section>

    <!-- Matrix Rain Script -->
    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const katakana = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
        const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const nums = '0123456789';
        const alphabet = katakana + latin + nums;

        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const rainDrops = [];

        for (let x = 0; x < columns; x++) {
            rainDrops[x] = Math.random() * canvas.height;
        }

        const draw = () => {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#FFD700';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillStyle = i % 3 === 0 ? '#9D4EDD' : '#FFD700';
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        };

        setInterval(draw, 50);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Mobile Menu Toggle
        function toggleMobileMenu() {
            const toggle = document.querySelector('.mobile-menu-toggle');
            const menu = document.querySelector('.header-right');
            toggle.classList.toggle('active');
            menu.classList.toggle('active');
        }

        // Close menu when clicking nav link
        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', () => {
                const toggle = document.querySelector('.mobile-menu-toggle');
                const menu = document.querySelector('.header-right');
                toggle.classList.remove('active');
                menu.classList.remove('active');
            });
        });

        // Auth Functions
        function openLogin() {
            alert('🔐 Sistema de Login em desenvolvimento.\n\n⚡ Integração Firebase + Google Auth será adicionada em breve.');
        }

        function openSignup() {
            alert('✨ Sistema de Cadastro em desenvolvimento.\n\n🔱 Login com Google + Email será implementado.');
        }
    </script>

</body>
</html>
